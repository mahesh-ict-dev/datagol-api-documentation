                name:
                  type: string
                uiDataType:
                  type: string
                colOptions:
                  type: object
                uiMetadata:
                  type: object
                  properties:
                    title:
                      type: string
                    precision:
                      nullable: true
                      type: number
            example:
              id: 6d9ae325-6fcd-4bd6-a732-b59e424fc095
              name: question
              uiDataType: SINGLE_LINE_TEXT
              colOptions: { }
              uiMetadata:
                title: Question
                precision: null
    delete:
      summary: Delete Column
