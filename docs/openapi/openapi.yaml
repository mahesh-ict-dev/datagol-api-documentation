  /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/linkRecordV2:
    post:
      summary: Link Records
      tags:
        - Links & Joins
      security:
        - bearerAuth: [ ]
      description: "## 1️⃣ Overview\n\n**Purpose:**\nLinks one or more records from a source table to records in a destination table via a LINK column. Supports batch linking of multiple record pairs in a single request.\n\n---\n\n## 2️⃣ Endpoint\n\n```\nPOST /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/linkRecordV2\n```\n\n---\n\n## 3️⃣ Path Parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID | ✅ Yes | Workspace identifier |\n| workbookId | UUID | ✅ Yes | Workbook identifier |\n\n---\n\n## 4️⃣ Authentication\n\nRequires **Bearer JWT Token**\n\n```\nAuthorization: Bearer <token>\n```\n\n---\n\n## 5️⃣ Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization | ✅ Yes |\n| Content-Type: application/json | ✅ Yes |\n\n---\n\n## 6️⃣ Request Body Schema\n\n```json\n[\n  {\n    \"sourceRecordId\": integer,\n    \"destinationRecordId\": integer,\n      \"linkColumnId\": \"uuid\"\n  }\n]\n```\n\n---\n\n## 7️⃣ Field Descriptions\n\n| Field | Type | Required | Description |\n| --- | --- | --- | --- |\n| sourceRecordId | integer | ✅ Yes | The row ID of the source record in the current table that you want to link to the destination record. |\n| destinationRecordId | integer | ✅ Yes | The row ID of the destination record in the linked table that you want to link to the source record. |\n|  linkColumnId | UUID | ✅ Yes | ID of the LINK type column in the current table, or the link dataType columnId for a LookUp column |\n\n---\n\n## 8️⃣ Example Request\n\n```bash\ncurl -X POST https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/linkRecordV2 \\\n-H \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\" \\\n-d '[\n  {\n    \"sourceRecordId\": 1,\n    \"destinationRecordId\": 1,\n    \"linkColumnId\": \"21224153-2f85-4b24-a306-4cfbc7e73f70\"\n  },\n  {\n    \"sourceRecordId\": 1,\n    \"destinationRecordId\": 2,\n     \"linkColumnId\": \"21224153-2f85-4b24-a306-4cfbc7e73f70\"\n  }\n]'\n```\n\n---\n\n## 9️⃣ Behavior Summary\n\n```\nLinks records between two tables via a LINK column.\nSupports:\n• Batch linking multiple record pairs in one request\n• sourceRecordId — PK of the record in the current table\n• destinationRecordId — PK of the record in the destination table\n•  linkColumnId — the LINK column ID or link dataType columnId for LookUp\n```"
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Workspace identifier
        - name: workbookId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Workbook identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                  - sourceRecordId
                  - destinationRecordId
                  - linkColumnId
                properties:
                  sourceRecordId:
                    type: integer
                    description: Primary key of the record in the current (source) table
                  destinationRecordId:
                    type: integer
                    description: Primary key of the record in the destination table
                  linkColumnId:
                    type: string
                    format: uuid
                    description: LINK column ID or link dataType columnId for LookUp
            example:
              - sourceRecordId: 1
                destinationRecordId: 1
                linkColumnId: 21224153-2f85-4b24-a306-4cfbc7e73f70
              - sourceRecordId: 1
                destinationRecordId: 2
                linkColumnId: 21224153-2f85-4b24-a306-4cfbc7e73f70
      responses:
        '200':
          description: Records linked successfully
    delete:
      summary: De-Link Records
      tags:
        - Links & Joins
      security:
        - bearerAuth: [ ]
      description: "## 1️⃣ Overview\n\n**Purpose:**\nRemoves existing links between records in a source table and records in a destination table. Supports batch de-linking of multiple record pairs in a single request.\n\n---\n\n## 2️⃣ Endpoint\n\n```\nDELETE /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/linkRecordV2\n```\n\n---\n\n## 3️⃣ Path Parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID | ✅ Yes | Workspace identifier |\n| workbookId | UUID | ✅ Yes | Workbook identifier |\n\n---\n\n## 4️⃣ Authentication\n\nRequires **Bearer JWT Token**\n\n```\nAuthorization: Bearer <token>\n```\n\n---\n\n## 5️⃣ Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization | ✅ Yes |\n| Content-Type: application/json | ✅ Yes |\n\n---\n\n## 6️⃣ Request Body Schema\n\n```json\n[\n  {\n    \"sourceRecordId\": integer,\n    \"destinationRecordId\": integer,\n    \"linkColumnId\": \"uuid\"\n  }\n]\n```\n\n---\n\n## 7️⃣ Field Descriptions\n\n| Field | Type | Required | Description |\n| --- | --- | --- | --- |\n| sourceRecordId | integer | ✅ Yes | Primary key of the record in the current (source) table |\n| destinationRecordId | integer | ✅ Yes | Primary key of the record in the destination table |\n|  linkColumnId | UUID | ✅ Yes | LINK column ID or link dataType columnId |\n\n---\n\n## 8️⃣ Example Request\n\n```bash\ncurl -X DELETE https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/linkRecordV2 \\\n-H \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\" \\\n-d '[\n  {\n    \"sourceRecordId\": 1,\n    \"destinationRecordId\": 1,\n    \"linkColumnId\": \"21224153-2f85-4b24-a306-4cfbc7e73f70\"\n  },\n  {\n    \"sourceRecordId\": 1,\n    \"destinationRecordId\": 2,\n    \"linkColumnId\": \"21224153-2f85-4b24-a306-4cfbc7e73f70\"\n  }\n]'\n```\n\n---\n\n## ```"
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Workspace identifier
        - name: workbookId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Workbook identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                  - sourceRecordId
                  - destinationRecordId
                  - linkColumnId
                properties:
                  sourceRecordId:
                    type: integer
                  destinationRecordId:
                    type: integer
                  linkColumnId:
                    type: string
                    format: uuid
            example:
              - sourceRecordId: 1
                destinationRecordId: 1
                linkColumnId: 21224153-2f85-4b24-a306-4cfbc7e73f70
              - sourceRecordId: 1
                destinationRecordId: 2
                linkColumnId: 21224153-2f85-4b24-a306-4cfbc7e73f70
      responses:
        '200':
          description: Records de-linked successfully
  /noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/{linkColumnId}/linkData:
    get:
      summary: Get Link Data
      tags:
        - Links & Joins
      security:
        - bearerAuth: [ ]
      description: "## 1️⃣ Overview\n\n**Purpose:**\nRetrieves the linked records for a specific row via a LINK column. Given a source record's row ID, this returns all destination records that are linked to it through the specified link column.\n\n---\n\n## 2️⃣ Endpoint\n\n```\nGET /noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/{linkColumnId}/linkData?id={rowId}\n```\n\n---\n\n## 3️⃣ Path Parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID | ✅ Yes | Workspace identifier |\n| tableId | UUID | ✅ Yes | Source table identifier |\n| linkColumnId | UUID | ✅ Yes | ID of the LINK column to fetch linked data for |\n\n---\n\n## 4️⃣ Query Parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| id | integer | ✅ Yes | The row ID of the source record whose linked records you want to retrieve |\n\n---\n\n## 5️⃣ Authentication\n\nRequires **Bearer JWT Token**\n\n```\nAuthorization: Bearer <token>\n```\n\n---\n\n## 6️⃣ Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization | ✅ Yes |\n| Content-Type: application/json | ✅ Yes |\n\n---\n\n## 7️⃣ Example Request\n\n```bash\ncurl -X GET 'https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/{linkColumnId}/linkData?id=1' \\\n-H \"Authorization: Bearer <token>\"\n```\n\n---\n\n## 8️⃣ Behavior Summary\n\n```\nReturns all records linked to the specified source row via the given LINK column.\nSupports:\n• Fetching linked records for any LINK column type (HAS_MANY, ONE_TO_ONE, MANY_TO_MANY)\n• id query param — row ID of the source record in the current table\n• linkColumnId — identifies which link column's data to retrieve\n```"
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Workspace identifier
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Source table identifier
        - name: linkColumnId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the LINK column to fetch linked data for
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: The row ID of the source record whose linked records you want to retrieve
      responses:
        '200':
          description: Linked records retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: Row ID of the linked record in the destination table
                    cellValues:
                      type: object
                      description: Map of column names to their values for the linked record
                      properties:
                        column1:
                          type: number
                          description: User-defined column value
                        column2:
                          type: string
                          description: User-defined column value
                        column3:
                          type: number
                          description: User-defined column value
                        column4:
                          type: integer
                          description: User-defined column value

              example:
                - id: 2
                  cellValues:
                    course_id: 102
                    course_name: JAVA
                    st_id: 3
                    employee_075d: 2
                    employee_753d: 4
