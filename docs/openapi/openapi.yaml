              tableName: workbook_1772105600085
              description: ''
              tableType: DYNAMIC
              columns:
                - description: ''
                  name: name
                  position: 0
                  uiDataType: SINGLE_LINE_TEXT
                  uiMetadata:
                    title: Name
                    frozen: true
                - description: ''
                  name: notes
                  position: 0
                  uiDataType: SINGLE_LINE_TEXT
                  uiMetadata:
                    title: Notes
                - description: ''
                  name: status
                  position: 0
                  uiDataType: SINGLE_LINE_TEXT
                  uiMetadata:
                    title: Status
                - description: ''
                  name: assignee
                  position: 0
                  uiDataType: USER
                  uiMetadata:
                    title: Assignee
              title: Workbook 1
