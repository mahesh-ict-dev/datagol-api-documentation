  /noCo/api/v2/workspaces/{workspaceId}/tables:
    post:
      summary: Create Workbooks
      parameters:
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: 7b6c69bd3431489e9bc79405e08fc37bb26813dcaf8ba5067808173b49282866
      responses:
        '200':
          description: Create Workbooks
      tags:
        - WorkBook
      description: "# Create Workbook\n\n## 1\uFE0F\u20E3 Overview\n\n**Purpose:**\n\
        \nCreates a new Workbook inside a specified workspace.\n\nIn the system architecture,\
        \ a **Workbook is implemented as a Table resource**.\n\nThis endpoint creates:\n\
        \n- A new table (workbook container)\n    \n- Initial column definitions\n\
        \    \n- Optional metadata (description, views, position)\n    \n- Table type\
        \ (e.g., DYNAMIC)\n    \n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n```\nPOST /noCo/api/v2/workspaces/{workspaceId}/tables\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID\
        \ | \u2705 Yes | Identifier of the workspace where the workbook will be created\
        \ |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\nRequires **Bearer JWT Token**\n\
        \n```\nAuthorization: x-auth-token <token>\n\n ```\n\n---\n\n## 5\uFE0F\u20E3\
        \ Required Permissions\n\nUser must have:\n\n- `CREATE_DATASOURCE` or equivalent\
        \ table creation permission\n    \n- Workspace-level write access\n    \n\n\
        ---\n\n## 6\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| --- |\
        \ --- |\n| Authorization | \u2705 Yes |\n| Content-Type: application/json\
        \ | \u2705 Yes |\n\n---\n\n## 7\uFE0F\u20E3 Request Body Schema\n\n```\n{\
        \  \"title\": \"string\",  \"tableName\": \"string\",  \"description\": \"\
        string\",  \"position\": 0,  \"tableType\": \"DYNAMIC | STATIC\",  \"columns\"\
        : [    {      \"name\": \"string\",      \"description\": \"string\",    \
        \  \"position\": 0,      \"uiDataType\": \"SINGLE_LINE_TEXT | NUMBER | USER\
        \ | DATE | ...\",      \"uiMetadata\": {        \"title\": \"string\",   \
        \     \"frozen\": true      }    }  ],  \"views\": []}\n\n ```\n\n---\n\n\
        ## 8\uFE0F\u20E3 Field Descriptions\n\n### Workbook-Level Fields\n\n| Field\
        \ | Type | Required | Description |\n| --- | --- | --- | --- |\n| title |\
        \ string | \u2705 Yes | Display name of the workbook |\n| tableName | string\
        \ | \u2705 Yes | Internal unique identifier |\n| description | string | \u274C\
        \ | Workbook description |\n| position | number | \u274C | Ordering index\
        \ in workspace |\n| tableType | enum | \u2705 Yes | Type of table (e.g., DYNAMIC)\
        \ |\n| views | array | \u274C | Initial view configurations |\n\n---\n\n###\
        \ Column Definition Fields\n\n| Field | Type | Required | Description |\n\
        | --- | --- | --- | --- |\n| name | string | \u2705 Yes | Internal column\
        \ name |\n| description | string | \u274C | Column description |\n| position\
        \ | number | \u274C | Column order index |\n| uiDataType | enum | \u2705 Yes\
        \ | UI column type |\n| uiMetadata.title | string | \u274C | Display name\
        \ |\n| uiMetadata.frozen | boolean | \u274C | Freeze column in UI |\n\n---\n\
        \n## 9\uFE0F\u20E3 Example Request\n\n```\ncurl -X POST \\https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables\
        \ \\-H \"Authorization: Bearer <token>\" \\-H \"Content-Type: application/json\"\
        \ \\-d &#x27;{  \"position\": 0,  \"tableName\": \"workbook_1772105600085\"\
        ,  \"description\": \"\",  \"tableType\": \"DYNAMIC\",  \"title\": \"Workbook\
        \ 1\",  \"columns\": [    {      \"name\": \"name\",      \"uiDataType\":\
        \ \"SINGLE_LINE_TEXT\",      \"uiMetadata\": {        \"title\": \"Name\"\
        ,        \"frozen\": true      }    },    {      \"name\": \"notes\",    \
        \  \"uiDataType\": \"SINGLE_LINE_TEXT\",      \"uiMetadata\": {        \"\
        title\": \"Notes\"      }    },    {      \"name\": \"status\",      \"uiDataType\"\
        : \"SINGLE_LINE_TEXT\",      \"uiMetadata\": {        \"title\": \"Status\"\
        \      }    },    {      \"name\": \"assignee\",      \"uiDataType\": \"USER\"\
        ,      \"uiMetadata\": {        \"title\": \"Assignee\"      }    }  ],  \"\
        views\": []}&#x27;\n\n ```\n\n---\n\n## \U0001F504 Behavior\n\nWhen this endpoint\
        \ is called:\n\n1. Validate workspace access\n    \n2. Validate unique `tableName`\n\
        \    \n3. Create workbook metadata\n    \n4. Create physical storage structure\n\
        \    \n5. Create defined columns\n    \n6. Apply UI metadata\n    \n7. Initialize\
        \ default system fields (if applicable)\n    \n8. Persist configuration\n\
        \    \n9. Return created workbook object\n    \n\n---\n\n## \U0001F539 Table\
        \ Type Behavior\n\n| Type | Description |\n| --- | --- |\n| DYNAMIC | Supports\
        \ computed fields, AI columns, formulas |\n| STATIC | Manual data entry only\
        \ |\n\n---\n\n## \U0001F510 Special Column Types\n\nExample:\n\n| uiDataType\
        \ | Behavior |\n| --- | --- |\n| SINGLE_LINE_TEXT | Basic text input |\n|\
        \ USER | User reference / assignment field |\n| DATE | Date picker |\n| NUMBER\
        \ | Numeric input |\n\n---\n\n## \u2705 Successful Response Example\n\n```\n\
        {  \"id\": \"generated-table-uuid\",  \"title\": \"Workbook 1\",  \"tableName\"\
        : \"workbook_1772105600085\",  \"tableType\": \"DYNAMIC\",  \"columns\": [\
        \    {      \"id\": \"column-uuid-1\",      \"name\": \"name\"    },    {\
        \      \"id\": \"column-uuid-2\",      \"name\": \"notes\"    }  ],  \"createdAt\"\
        : \"2026-02-26T13:00:00Z\"}\n\n ```\n\n---\n\n---\n\n# \U0001F4CC Behavior\
        \ Summary\n\nThis endpoint:\n\n> &lt;p &gt;Creates a new Workbook (table)\
        \ with initial column configuration inside a workspace.&lt;/p&gt; \n  \n\n\
        It supports:\n\n- Custom column definitions\n    \n- UI metadata configuration\n\
        \    \n- Dynamic table types\n    \n- Initial view setup"
      requestBody:
        content:
