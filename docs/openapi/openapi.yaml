    put:
      summary: Update Row In Workbook
      parameters:
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: 7b6c69bd3431489e9bc79405e08fc37bb26813dcaf8ba5067808173b49282866
      responses:
        '200':
          description: Update Row In Workbook
      tags:
        - WorkBook
      description: "# Update Row\n\n## 1\uFE0F\u20E3 Overview\n\n**Purpose:**\n\n\
        Updates an existing row in a specified table within a workspace.\n\nThis endpoint\
        \ allows:\n\n- Updating one or more column values in a row\n    \n- Triggering\
        \ AI column regeneration (if dependent fields change)\n    \n- Recomputing\
        \ formulas (if applicable)\n    \n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n```\n\
        PUT /noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/rows\n\n ```\n\n\
        ---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type | Required |\
        \ Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID | \u2705\
        \ Yes | Identifier of the workspace |\n| workbookId | UUID | \u2705 Yes |\
        \ Identifier of the table |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\n\
        Requires x-auth-token\n\n```\nAuthorization: x-auth-token\n\n ```\n\n---\n\
        \n## 5\uFE0F\u20E3 Required Permissions\n\nUser must have:\n\n- Row edit permission\n\
        \    \n- Table edit access\n    \n- Workspace access\n    \n\nIf row updates\
        \ affect:\n\n- AI columns \u2192 AI execution permission required\n    \n\
        - Formula columns \u2192 system recalculates automatically\n    \n\n---\n\n\
        ## 6\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| --- | --- |\n\
        | Authorization | \u2705 Yes |\n| Content-Type: application/json | \u2705\
        \ Yes |\n\nBrowser-specific headers are optional.\n\n---\n\n## 7\uFE0F\u20E3\
        \ Request Body Schema\n\n```\n{  \"id\": \"number | string\",  \"cellValues\"\
        : {    \"columnName\": \"value\"  },  \"cellValuesByColumnId\": {    \"columnId\"\
        : \"value\"  }}\n\n ```\n\n---\n\n## 8\uFE0F\u20E3 Field Descriptions\n\n\
        | Field | Type | Required | Description |\n| --- | --- | --- | --- |\n| id\
        \ | Row identifier | \u2705 Yes | Unique row ID |\n| cellValues | Object |\
        \ \u274C | Key-value map using column names |\n| cellValuesByColumnId | Object\
        \ | \u274C | Key-value map using column IDs |\n\nAt least one of `cellValues`\
        \ or `cellValuesByColumnId` must be provided.\n\n---\n\n## 9\uFE0F\u20E3 Example\
        \ Request\n\n```\ncurl -X PUT \\https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows\
        \ \\-H \"Authorization: x-auth-token <token>\" \\-H \"Content-Type: application/json\"\
        \ \\-d &#x27;{  \"id\": 1,  \"cellValues\": {    \"name\": \"dega\"  },  \"\
        cellValuesByColumnId\": {}}&#x27;\n\n ```\n\n---\n\n## \U0001F504 Behavior\n\
        \nWhen this endpoint is called:\n\n1. Validate workspace access\n    \n2.\
        \ Validate table existence\n    \n3. Validate row existence\n    \n4. Validate\
        \ column names or IDs\n    \n5. Check column editability flags\n    \n6. Update\
        \ provided cell values only (partial update)\n    \n7. Trigger:\n    \n  \
        \  - Formula recalculation (if applicable)\n        \n    - AI column regeneration\
        \ (if dependent columns changed)\n        \n8. Persist changes\n    \n9. Return\
        \ updated row\n    \n\n---\n\n## \U0001F916 AI Column Interaction\n\nIf the\
        \ table contains AI-enabled columns:\n\n- Updating dependent fields may:\n\
        \    \n    - Automatically regenerate AI values\n        \n    - Trigger asynchronous\
        \ processing\n        \n- If AI column is manual-override enabled:\n    \n\
        \    - System may preserve manual values\n        \n\n---\n\n## \U0001F4CA\
        \ Formula Column Interaction\n\nIf:\n\n```\n\"isColumnLevelFormula\": true\n\
        \n ```\n\n- Manual update to that column is blocked\n    \n- Value recalculated\
        \ automatically\n    \n\n---\n\n## \u2705 Successful Response (Example)\n\n\
        ### Option A \u2013 200 OK\n\n```\n{  \"id\": 1,  \"cellValues\": {    \"\
        name\": \"dega\"  },  \"updatedAt\": \"2026-02-26T12:45:00Z\"}\n\n ```\n\n\
        ---\n\n### Option B \u2013 Full Row Object Returned\n\n```\n{  \"id\": 1,\
        \  \"values\": {    \"name\": \"dega\",    \"ai_summary\": \"Generated text\"\
        ,    \"created_at\": \"2026-02-20T10:00:00Z\"  }}\n\n ```\n\n---\n\n# \u26A0\
        \uFE0F Validation Rules\n\n- Row ID must exist\n    \n- Cannot update system-generated\
        \ columns\n    \n- Cannot update formula-only columns\n    \n- Data must match\
        \ column type\n    \n- Required columns cannot be null\n    \n\n---\n\n# \u274C\
        \ Error Responses\n\n| Status Code | Meaning |\n| --- | --- |\n| 400 | Invalid\
        \ payload |\n| 401 | Unauthorized |\n| 403 | Permission denied |\n| 404 |\
        \ Row not found |\n| 409 | Data type mismatch |\n| 422 | Attempt to modify\
        \ restricted column |\n| 500 | Internal server error |\n\n---\n\n# \U0001F4CC\
        \ Behavior Summary\n\nThis endpoint:\n\n> &lt;p &gt;Updates one or more cell\
        \ values in an existing row within a table.&lt;/p&gt; \n  \n\nIt supports:\n\
        \n- Partial updates\n    \n- AI-triggered recalculation\n    \n- Formula recalculation"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                cellValues:
                  type: object
                  properties:
                    name:
                      type: string
                cellValuesByColumnId:
                  type: object
            example:
              id: 1
              cellValues:
                name: 'dega

                  '
              cellValuesByColumnId: {}
    delete:
      summary: Delete Rows
      parameters:
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: c2cccdf27ebaaefeffeedee0ca4cceb9333b4f31e676e4531cc208b9725bc330
      responses:
        '200':
          description: Delete Rows
      tags:
        - WorkBook
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nDeletes one or more\
        \ rows from a workbook within a workspace.\n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\
        \n``` bash\nDELETE /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID\
        \ | \u2705 Yes | Workspace identifier |\n| workbookId | UUID | \u2705 Yes\
        \ | Workbook identifier |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\nRequires\
        \ authentication using:\n\n``` bash\nx-auth-token: <token>\n\n ```\n\n---\n\
        \n## 5\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| --- | --- |\n\
        | x-auth-token | \u2705 Yes |\n| Content-Type: application/json | \u2705 Yes\
        \ |\n\n---\n\n## 6\uFE0F\u20E3 Request Body Schema\n\n``` json\n{\n  \"rowIds\"\
        : []\n}\n\n ```\n\n---\n\n## 7\uFE0F\u20E3 Field Descriptions\n\n### Row Deletion\
        \ Payload\n\n| Field | Type | Required | Description |\n| --- | --- | ---\
        \ | --- |\n| rowIds | array | \u2705 Yes | List of row identifiers to delete\
        \ |\n\n---\n\n## 8\uFE0F\u20E3 Example Request\n\n``` bash\ncurl --location\
        \ --request DELETE 'https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows'\
        \ \\\n--header &#x27;x-auth-token: <token>&#x27; \\\n--header 'Content-Type:\
        \ application/json' \\\n--data '{\n  \"rowIds\": [\n    5,\n    4,\n    3\n\
        \  ]\n}'\n\n ```\n\n---\n\n## 9\uFE0F\u20E3 Behavior Summary\n\n```\nDeletes\
        \ one or more workbook rows.\nSupports bulk deletion using rowIds array.\n\
        Validation Rules:\n\u2022 Workbook must exist within workspace.\n\u2022 User\
        \ must have write/delete permission.\n\u2022 Provided rowIds must be valid.\n\
        \n ```"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rowIds:
                  type: array
                  items:
                    type: integer
            example:
              rowIds:
                - 5
                - 4
                - 3
  /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows/{rowId}:
    get:
      summary: Get Row Data By ID
      responses:
        '200':
          description: Get Row Data By ID
      tags:
        - WorkBook
      description: "# Get Row Data By ID\n\n## 1\uFE0F\u20E3 Overview\n\n**Purpose:**\n\
        \nRetrieves a single row\u2019s complete data from a specified table within\
        \ a workspace using its unique row ID.\n\nThis endpoint returns:\n\n- All\
        \ column values for the row\n    \n- AI-generated values (if applicable)\n\
        \    \n- Formula-calculated values\n    \n- System fields (if configured to\
        \ return them)\n    \n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n```\nGET /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows/{rowId}\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID\
        \ | \u2705 Yes | Identifier of the workspace |\n| workbookId | UUID | \u2705\
        \ Yes | Identifier of the table |\n| rowId | string / number | \u2705 Yes\
        \ | Unique identifier of the row |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\
        \nRequires **Bearer JWT Token**\n\n```\nAuthorization: x-auth-token <token>\n\
        \n ```\n\n---\n\n## 5\uFE0F\u20E3 Required Permissions\n\nUser must have:\n\
        \n- Workspace access\n    \n- Table view permission\n    \n- Row read permission\n\
        \    \n\nIf table contains:\n\n- AI columns \u2192 permission to view generated\
        \ content required\n    \n- Restricted columns \u2192 values may be masked\
        \ or omitted\n    \n\n---\n\n## 6\uFE0F\u20E3 Request Headers\n\n| Header\
        \ | Required |\n| --- | --- |\n| Authorization | \u2705 Yes |\n| Content-Type:\
        \ application/json | Optional |\n\nBrowser headers (`sec-ch-ua`, `User-Agent`,\
        \ etc.) are not required for backend integration.\n\n---\n\n## 7\uFE0F\u20E3\
        \ Request Example\n\n```\ncurl -X GET \\https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows/{rowId}\
        \ \\-H \"Authorization: x-auth-token <token>\"\n\n ```\n\nExample with actual\
        \ row ID:\n\n```\ncurl -X GET \\https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbook}/rows/1\
        \ \\-H \"Authorization: x-auth-token <token>\"\n\n ```\n\n---\n\n## 8\uFE0F\
        \u20E3 Successful Response\n\n### Example Response\n\n```\n{  \"id\": 1, \
        \ \"values\": {    \"name\": \"dega\",    \"status\": \"Active\",    \"ai_summary\"\
        : \"Generated summary text\",    \"created_at\": \"2026-02-20T10:00:00Z\"\
        \  },  \"createdAt\": \"2026-02-20T10:00:00Z\",  \"updatedAt\": \"2026-02-26T12:45:00Z\"\
        }\n\n ```\n\n---\n\n## 9\uFE0F\u20E3 Response Fields\n\n| Field | Description\
        \ |\n| --- | --- |\n| id | Row identifier |\n| values | Key-value map of column\
        \ names and values |\n| createdAt | Row creation timestamp |\n| updatedAt\
        \ | Last modification timestamp |\n\n---\n\n# \U0001F504 Behavior\n\nWhen\
        \ this endpoint is called:\n\n1. Validate workspace access\n    \n2. Validate\
        \ table existence\n    \n3. Validate row existence\n    \n4. Validate user\
        \ read permissions\n    \n5. Retrieve row data\n    \n6. Include:\n    \n\
        \    - Standard column values\n        \n    - AI-generated values\n     \
        \   \n    - Formula results\n        \n7. Return structured JSON response\n\
        \    \n\n---\n\n# \U0001F916 AI Column Handling\n\nIf the table contains AI-enabled\
        \ columns:\n\n- Returns last generated value\n    \n- Does not trigger regeneration\n\
        \    \n- If generation is asynchronous and pending:\n    \n    - May return\
        \ null\n        \n    - Or may return processing status (implementation-dependent)\n\
        \        \n\n---\n\n# \U0001F4CA Formula Column Handling\n\nIf a column is\
        \ a formula:\n\n- Returned value is the computed result\n    \n- Manual override\
        \ is not applicable\n    \n\n---\n\n# \U0001F4CC Behavior Summary\n\nThis\
        \ endpoint:\n\n> &lt;p &gt;Retrieves complete data for a specific row by ID\
        \ within a workspace table.&lt;/p&gt; \n  \n\nIt supports:\n\n- Standard column\
        \ retrieval\n    \n- AI-generated values\n    \n- Formula-computed values\n\
        \    \n- Permission-based visibility"
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
        example: '{{workspaceId}}'
      - name: workbookId
        in: path
        required: true
        schema:
          type: string
        example: '{{workbookId}}'
      - name: rowId
        in: path
        required: true
        schema:
          type: string
        example: '{{rowId}}'
  /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/column:
    post:
      summary: Generate AI Column
      parameters:
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: c2cccdf27ebaaefeffeedee0ca4cceb9333b4f31e676e4531cc208b9725bc330
      responses:
        '200':
          description: Generate AI Column
      tags:
        - WorkBook
      description: "# Create AI Generated Column\n\n## 1\uFE0F\u20E3 Overview\n\n\
        **Purpose:**\n\nCreates a new column in a specified workspace table. The column\
        \ can optionally be AI-generated using a configured language model.\n\nWhen\
        \ `aiSettings.enabled = true`, the column becomes a computed AI column that\
        \ auto-generates values based on a prompt and row data.\n\n---\n\n## 2\uFE0F\
        \u20E3 Endpoint\n\n```\nPOST /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/column\n\
        \n ```\n\n### Path Parameters\n\n| Parameter | Type | Required | Description\
        \ |\n| --- | --- | --- | --- |\n| workspaceId | UUID | \u2705 Yes | ID of\
        \ the workspace |\n| tableId | UUID | \u2705 Yes | ID of the target table\
        \ |\n\n---\n\n## 3\uFE0F\u20E3 Authentication\n\nRequires **Bearer Token (JWT)**.\n\
        \n```\nAuthorization: Bearer <access_token>\n\n ```\n\n### Required Permissions\n\
        \nUser must have:\n\n- `CREATE_DATASOURCE` or equivalent column creation permission\n\
        \    \n- Table edit access\n    \n\n---\n\n## 4\uFE0F\u20E3 Request Headers\n\
        \n| Header | Value |\n| --- | --- |\n| Content-Type | application/json |\n\
        | Authorization | Bearer token |\n\n---\n\n## 5\uFE0F\u20E3 Request Body Schema\n\
        \n```\n{  \"name\": \"string\",  \"uiDataType\": \"SINGLE_LINE_TEXT | NUMBER\
        \ | ...\",  \"description\": \"string\",  \"required\": false,  \"uiMetadata\"\
        : {    \"title\": \"string\"  },  \"settings\": {    \"aiSettings\": {   \
        \   \"enabled\": true,      \"prompt\": \"string\",      \"model\": \"string\"\
        ,      \"webAccess\": false    }  }}\n\n ```\n\n---\n\n## 6\uFE0F\u20E3 Field\
        \ Descriptions\n\n### Core Column Fields\n\n| Field | Type | Required | Description\
        \ |\n| --- | --- | --- | --- |\n| name | string | \u2705 | Internal column\
        \ name |\n| uiDataType | enum | \u2705 | Data type of the column |\n| description\
        \ | string | \u274C | Column description |\n| required | boolean | \u274C\
        \ | Whether the column is mandatory |\n| uiMetadata.title | string | \u274C\
        \ | Display name in UI |\n\n---\n\n### \U0001F916 AI Settings (Optional)\n\
        \n| Field | Type | Required | Description |\n| --- | --- | --- | --- |\n|\
        \ enabled | boolean | \u2705 (if aiSettings present) | Enables AI computation\
        \ |\n| prompt | string | \u2705 | Prompt used to generate values |\n| model\
        \ | string | \u2705 | LLM model to use |\n| webAccess | boolean | \u274C |\
        \ Allows external web search (if supported) |\n\n---\n\n## 7\uFE0F\u20E3 Behavior\n\
        \n### If `aiSettings.enabled = false`\n\n- Column behaves as a standard manual\
        \ input column.\n    \n\n### If `aiSettings.enabled = true`\n\n- Column becomes\
        \ computed.\n    \n- Value is generated automatically using:\n    \n    -\
        \ Row context\n        \n    - Prompt\n        \n    - Selected model\n  \
        \      \n- Users may not manually edit values (depending on system rules).\n\
        \    \n- Generation may trigger:\n    \n    - On row creation\n        \n\
        \    - On row update\n        \n    - On manual regeneration\n        \n\n\
        ---\n\n## 8\uFE0F\u20E3 Example \u2013 Create AI Column\n\n```\ncurl -X POST\
        \ \\https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/column\
        \ \\-H \"Authorization: Bearer <token>\" \\-H \"Content-Type: application/json\"\
        \ \\-d &#x27;{  \"name\": \"col\",  \"uiDataType\": \"SINGLE_LINE_TEXT\",\
        \  \"required\": false,  \"settings\": {    \"aiSettings\": {      \"enabled\"\
        : true,      \"prompt\": \"Extract first name from full name\",      \"model\"\
        : \"gpt-4o-mini\",      \"webAccess\": false    }  }}&#x27;\n\n ```\n\n---\n\
        \n## 9\uFE0F\u20E3 Example Use Case\n\nIf table has:\n\n| full_name |\n| ---\
        \ |\n| John Smith |\n| Alice Brown |\n\nAI column prompt:\n\n```\nExtract\
        \ first name from full name\n\n ```\n\nGenerated column:\n\n| full_name |\
        \ first_name |\n| --- | --- |\n| John Smith | John |\n| Alice Brown | Alice\
        \ |\n\n---\n\n## \U0001F51F Response (Example)\n\n```\n{  \"id\": \"column-uuid\"\
        ,  \"name\": \"col\",  \"uiDataType\": \"SINGLE_LINE_TEXT\",  \"aiEnabled\"\
        : true,  \"createdAt\": \"timestamp\"}\n\n ```"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                uiDataType:
                  type: string
                description:
                  type: string
                uiMetadata:
                  type: object
                  properties:
                    title:
                      type: string
                required:
                  type: boolean
                settings:
                  type: object
                  properties:
                    aiSettings:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        prompt:
                          type: string
                        model:
                          type: string
                        webAccess:
                          type: boolean
                name:
                  type: string
            example:
              uiDataType: SINGLE_LINE_TEXT
              description: ''
              uiMetadata:
                title: col
              required: false
