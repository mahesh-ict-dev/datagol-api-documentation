            type: string
          example: Bearer <token>
      responses:
        '200':
          description: Update Row In Workbook
      tags:
        - WorkBook
      description: "# Update Row\n\n## 1\uFE0F\u20E3 Overview\n\n**Purpose:**\n\n\
        Updates an existing row in a specified table within a workspace.\n\nThis endpoint\
        \ allows:\n\n- Updating one or more column values in a row\n    \n- Triggering\
        \ AI column regeneration (if dependent fields change)\n    \n- Recomputing\
        \ formulas (if applicable)\n    \n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n```\n\
        PUT /noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/rows\n\n ```\n\n\
        ---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type | Required |\
        \ Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID | \u2705\
        \ Yes | Identifier of the workspace |\n| workbookId | UUID | \u2705 Yes |\
        \ Identifier of the table |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\n\
        Requires Authorization\n\n```\nAuthorization: Authorization\n\n ```\n\n---\n\
        \n## 5\uFE0F\u20E3 Required Permissions\n\nUser must have:\n\n- Row edit permission\n\
        \    \n- Table edit access\n    \n- Workspace access\n    \n\nIf row updates\
        \ affect:\n\n- AI columns \u2192 AI execution permission required\n    \n\
        - Formula columns \u2192 system recalculates automatically\n    \n\n---\n\n\
        ## 6\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| --- | --- |\n\
        | Authorization | \u2705 Yes |\n| Content-Type: application/json | \u2705\
        \ Yes |\n\nBrowser-specific headers are optional.\n\n---\n\n## 7\uFE0F\u20E3\
        \ Request Body Schema\n\n```\n{  \"id\": \"number | string\",  \"cellValues\"\
        : {    \"columnName\": \"value\"  },  \"cellValuesByColumnId\": {    \"columnId\"\
        : \"value\"  }}\n\n ```\n\n---\n\n## 8\uFE0F\u20E3 Field Descriptions\n\n\
        | Field | Type | Required | Description |\n| --- | --- | --- | --- |\n| id\
        \ | Row identifier | \u2705 Yes | Unique row ID |\n| cellValues | Object |\
        \ \u274C | Key-value map using column names |\n| cellValuesByColumnId | Object\
        \ | \u274C | Key-value map using column IDs |\n\nAt least one of `cellValues`\
        \ or `cellValuesByColumnId` must be provided.\n\n---\n\n## 9\uFE0F\u20E3 Example\
        \ Request\n\n```\ncurl -X PUT \\https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows\
        \ \\-H \"Authorization: Authorization Bearer <token>\" \\-H \"Content-Type: application/json\"\
        \ \\-d &#x27;{  \"id\": 1,  \"cellValues\": {    \"name\": \"dega\"  },  \"\
        cellValuesByColumnId\": {}}&#x27;\n\n ```\n\n---\n\n## \U0001F504 Behavior\n\
        \nWhen this endpoint is called:\n\n1. Validate workspace access\n    \n2.\
        \ Validate table existence\n    \n3. Validate row existence\n    \n4. Validate\
        \ column names or IDs\n    \n5. Check column editability flags\n    \n6. Update\
        \ provided cell values only (partial update)\n    \n7. Trigger:\n    \n  \
        \  - Formula recalculation (if applicable)\n        \n    - AI column regeneration\
        \ (if dependent columns changed)\n        \n8. Persist changes\n    \n9. Return\
        \ updated row\n    \n\n---\n\n## \U0001F916 AI Column Interaction\n\nIf the\
        \ table contains AI-enabled columns:\n\n- Updating dependent fields may:\n\
        \    \n    - Automatically regenerate AI values\n        \n    - Trigger asynchronous\
        \ processing\n        \n- If AI column is manual-override enabled:\n    \n\
        \    - System may preserve manual values\n        \n\n---\n\n## \U0001F4CA\
        \ Formula Column Interaction\n\nIf:\n\n```\n\"isColumnLevelFormula\": true\n\
        \n ```\n\n- Manual update to that column is blocked\n    \n- Value recalculated\
        \ automatically\n    \n\n---\n\n## \u2705 Successful Response (Example)\n\n\
        ### Option A \u2013 200 OK\n\n```\n{  \"id\": 1,  \"cellValues\": {    \"\
        name\": \"dega\"  },  \"updatedAt\": \"2026-02-26T12:45:00Z\"}\n\n ```\n\n\
        ---\n\n### Option B \u2013 Full Row Object Returned\n\n```\n{  \"id\": 1,\
        \  \"values\": {    \"name\": \"dega\",    \"ai_summary\": \"Generated text\"\
        ,    \"created_at\": \"2026-02-20T10:00:00Z\"  }}\n\n ```\n\n---\n\n# \u26A0\
        \uFE0F Validation Rules\n\n- Row ID must exist\n    \n- Cannot update system-generated\
        \ columns\n    \n- Cannot update formula-only columns\n    \n- Data must match\
        \ column type\n    \n- Required columns cannot be null\n    \n\n---\n\n# \u274C\
        \ Error Responses\n\n| Status Code | Meaning |\n| --- | --- |\n| 400 | Invalid\
        \ payload |\n| 401 | Unauthorized |\n| 403 | Permission denied |\n| 404 |\
        \ Row not found |\n| 409 | Data type mismatch |\n| 422 | Attempt to modify\
        \ restricted column |\n| 500 | Internal server error |\n\n---\n\n# \U0001F4CC\
        \ Behavior Summary\n\nThis endpoint:\n\n> &lt;p &gt;Updates one or more cell\
        \ values in an existing row within a table.&lt;/p&gt; \n  \n\nIt supports:\n\
        \n- Partial updates\n    \n- AI-triggered recalculation\n    \n- Formula recalculation"
      requestBody:
