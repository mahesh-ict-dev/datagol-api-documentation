      responses:
        '200':
          description: Get tables in workspace
      tags:
        - WorkBook
      description: "### 1\uFE0F\u20E3 Overview\n\n**Purpose:** This endpoint retrieves\
        \ a list of all tables (Workbooks) associated with a specific workspace. It\
        \ is primarily used to populate workspace dashboards or to fetch structural\
        \ metadata for data synchronization tasks.\n\n### 2\uFE0F\u20E3 Endpoint\n\
        \nHTTP\n\n```\nGET /noCo/api/v2/workspaces/{workspaceId}/tables\n\n ```\n\n\
        ### 3\uFE0F\u20E3 Path Parameters\n\n| **Parameter** | **Type** | **Required**\
        \ | **Description** |  \n| **workspaceId** | UUID | \u2705 Yes | Identifier\
        \ of the workspace to query. |\n\n### 4\uFE0F\u20E3 Query Parameters\n\n|\
        \ **Parameter** | **Type** | **Required** | **Description** |  \n| **isIncludeColumns**\
        \ | boolean | \u274C No | If set to `true`, the response includes the full\
        \ column metadata for each table. |\n\n### 5\uFE0F\u20E3 Authentication\n\n\
        Requires a valid authentication token passed in the custom header.\n\nHTTP\n\
        \n```\nx-auth-token: <token>\n\n ```\n\n### 6\uFE0F\u20E3 Required Permissions\n\
        \nUser must have:\n\n- **READ_WORKSPACE** permissions for the specified ID.\n\
        \    \n- Active membership in the workspace.\n    \n\n### 7\uFE0F\u20E3 Request\
        \ Headers\n\n| **Header** | **Required** | **Description** |  \n| **x-auth-token**\
        \ | \u2705 Yes | Your API authentication token. |  \n| **Accept** | \u274C\
        \ No | `application/json`. |\n\n### 8\uFE0F\u20E3 Field Descriptions (Response)\n\
        \n| **Field** | **Type** | **Description** |  \n| **id** | string | Unique\
        \ identifier for the table. |  \n| **title** | string | Display name of the\
        \ workbook. |  \n| **columns** | array | List of column objects (only if `isIncludeColumns=true`).\
        \ |  \n| **tableType** | enum | Type of table (e.g., `DYNAMIC`, `STATIC`).\
        \ |\n\n### 9\uFE0F\u20E3 Example Request\n\nBash\n\n```\ncurl -X GET \\\n\
        \  \"https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables?isIncludeColumns=true\"\
        \ \\\n  -H \"x-auth-token: <your_token_here>\"\n\n ```\n\n### \U0001F504 Behavior\n\
        \nWhen this endpoint is called:\n\n- **Workspace Validation:** The system\
        \ confirms the `workspaceId` exists and the user has access.\n    \n- **Conditional\
        \ Expansion:** If `isIncludeColumns` is `true`, the system performs a join\
        \ or secondary lookup to fetch column definitions (names, types, and UI metadata).\n\
        \    \n- **Sorting:** Tables are typically returned based on their `position`\
        \ index within the workspace."
