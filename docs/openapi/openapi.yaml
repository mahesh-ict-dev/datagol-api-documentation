  /noCo/api/v2/workspaces/{workspace_id}/extraction/{extraction_id}/{element_type}/{element_id}/run:
    post:
      summary: Trigger Extraction
      parameters:
        - name: extractOnlyNew
          in: query
          schema:
            type: boolean
          example: 'true'
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer <token>
      responses:
        '200':
          description: Trigger Extraction
      tags:
        - AI Extraction
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nTriggers an extraction\
        \ run for a specified extraction configuration and element.\n\nSupports extraction\
        \ modes for:\n\n- New records only\n    \n- Selected rows\n    \n- Filter-based\
        \ extraction\n    \n- Full dataset extraction\n    \n\n---\n\n## 2\uFE0F\u20E3\
        \ Endpoint\n\n``` bash\nPOST /noCo/api/v2/workspaces/{workspaceId}/extraction/{extractionId}/{elementType}/{elementId}/run?extractOnlyNew=true\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID\
        \ | \u2705 Yes | Workspace identifier |\n| extractionId | string | \u2705\
        \ Yes | Extraction configuration ID |\n| elementType | string | \u2705 Yes\
        \ | COLUMN / FILE / FOLDER |\n| elementId | string | \u2705 Yes | Element\
        \ identifier |\n\n---\n\n## 4\uFE0F\u20E3 Query Parameters\n\n| Parameter\
        \ | Type | Required | Description |\n| --- | --- | --- | --- |\n| extractOnlyNew\
        \ | boolean | \u274C No | Default false |\n\nBehavior:\n\n- `true` \u2192\
        \ Only new records are extracted\n    \n- `false` \u2192 Selected records\
        \ are upserted (update existing + insert new)\n    \n\n---\n\n## 5\uFE0F\u20E3\
        \ Authentication\n\nRequires authentication using:\n\n``` bash\nAuthorization:\
        \ Bearer <token>\n\n ```\n\n---\n\n## 6\uFE0F\u20E3 Request Headers\n\n| Header |\
        \ Required |\n| --- | --- |\n| Authorization | \u2705 Yes |\n| Content-Type:\
        \ application/json | Optional |\n\n---\n\n## 7\uFE0F\u20E3 Request Body Schema\
        \ (Optional)\n\n``` json\n{\n  \"rows\": [],\n  \"whereClause\": \"string\"\
        ,\n  \"selectAll\": true\n}\n\n ```\n\n---\n\n## 8\uFE0F\u20E3 Field Descriptions\n\
        \n### Extraction Execution Controls\n\n| Field | Type | Required | Description\
        \ |\n| --- | --- | --- | --- |\n| rows | array | \u274C No | Specific rows\
        \ to extract |\n| whereClause | string | \u274C No | Filter condition |\n\
        | selectAll | boolean | \u274C No | Select all rows flag |\n\n---\n\n## 9\uFE0F\
        \u20E3 Example Request\n\n### Trigger extraction for selected rows\n\n```\
        \ bash\ncurl -X POST \"https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/extraction/{extractionId}/{elementType}/{elementId}/run?extractOnlyNew=true\"\
        \ \\\n-H \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\"\
        \ \\\n-d '{\n  \"selectAll\": false,\n  \"rows\": [\n    {\n      \"id\":\
        \ \"row1\",\n      \"name\": \"Sample Data\"\n    }\n  ]\n}'\n\n ```\n\n---\n\
        \n## \U0001F51F Behavior Summary\n\n```\nTriggers an extraction execution\
        \ job for the specified configuration.\nSupports:\n\u2022 Incremental Extraction\
        \ \u2014 When extractOnlyNew=true, only new records are processed.\n\u2022\
        \ Upsert Extraction \u2014 When extractOnlyNew=false, existing records are\
        \ updated and new records are inserted.\n\u2022 Selective Extraction \u2014\
        \ Allows extraction of specific rows using the rows field.\n\u2022 Filtered\
        \ Extraction \u2014 Supports conditional extraction using whereClause.\n\u2022\
        \ Full Extraction \u2014 When selectAll=true, extracts all matching records\
        \ (rows field should be omitted).\n\n ```\n\n---\n\n## \U0001F4CC Additional\
        \ Description\n\nWhen `selectAll` is true, the system extracts all matching\
        \ records.  \nIf `selectAll` is false, the client must provide the complete\
        \ row data in the `rows` field.\n\nThe request supports two major extraction\
        \ strategies:\n\n- **Incremental Extraction:** Controlled by `extractOnlyNew=true`\n\
        \    \n- **Upsert Extraction:** When `extractOnlyNew=false`, existing records\
        \ are updated and new records are inserted."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rows:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      cellValues:
                        type: object
                        properties:
                          workspace_id:
                            type: string
                          noco_e0e0ea6e:
                            type: integer
                          web_url:
                            type: string
                            format: uri
                          meeting_id:
                            type: string
                          call_recording_id:
                            type: string
                          id:
                            type: string
                          raw_transcript:
                            type: string
                      cellValuesByColumnId:
                        type: object
                whereClause:
                  type: string
                selectAll:
                  type: boolean
            example:
              rows:
                - id: 0
                  cellValues:
                    workspace_id: 35bb2bfb-5b7b-451c-9be4-6de7b5ed307e
                    noco_e0e0ea6e: 0
                    web_url: https://app.datagol.ai/
                    meeting_id: 24124
                    call_recording_id: 21512512
                    id: '{"meeting_id":"325325","workspace_id":"214215","call_recording_id":"21515124"}'
                    raw_transcript: 'Iris: Hello. Alex: Hi. Iris: We’re exploring software you can summon'
                  cellValuesByColumnId: {}
              whereClause: 1 = 1
              selectAll: false
    parameters:
      - name: workspace_id
        in: path
        required: true
        schema:
          type: string
        example: '{{workspace_id}}'
      - name: extraction_id
        in: path
        required: true
        schema:
          type: string
        example: '{{extraction_id}}'
      - name: element_type
        in: path
        required: true
        schema:
          type: string
        example: '{{element_type}}'
      - name: element_id
        in: path
        required: true
        schema:
          type: string
        example: '{{element_id}}'
