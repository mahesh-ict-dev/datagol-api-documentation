      description: "## 1️⃣ Overview\n\n**Purpose:**  \nUpdates an existing column's
        metadata and configuration within a specified table in a workspace.\n\nThis
        endpoint supports:\n\n- Updating column display name\n\n- Changing UI data
        type\n\n- Updating UI metadata (title, precision, etc.)\n\n- Modifying column
        options\n\n---\n\n## 2️⃣ Endpoint\n\n```\nPUT /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/columns/{columnId}\n\n
  `````\n\n---\n\n## 3️⃣ Path Parameters\n\n| Parameter | Type | Required | Description
        |\n| --- | --- | --- | --- |\n| workspaceId | UUID | ✅ Yes | Workspace identifier
        |\n| workbookId | UUID | ✅ Yes | Table identifier |\n| columnId | UUID | ✅
        Yes | Column identifier |\n\n---\n\n## 4️⃣ Authentication\n\nRequires **Bearer
        JWT Token**\n\n```\nAuthorization: Bearer <token>\n\n ```\n\n---\n\n## 5️⃣
        Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization |
        ✅ Yes |\n| Content-Type: application/json | ✅ Yes |\n\n---\n\n## 6️⃣ Request
        Body Schema\n\n``` json\n{\n  \"id\": \"uuid\",\n  \"name\": \"string\",\n
        \ \"uiDataType\": \"string\",\n  \"colOptions\": {},\n  \"uiMetadata\": {\n
        \   \"title\": \"string\",\n    \"precision\": null\n  }\n}\n\n ```\n\n---\n\n##
        7️⃣ Field Descriptions\n\n### Column Configuration\n\n| Field | Type | Required
        | Description |\n| --- | --- | --- | --- |\n| id | UUID | ✅ Yes | Unique identifier
        of the column to update |\n| name | string | ✅ Yes | Internal column name |\n|
        uiDataType | string | ✅ Yes | Column type (e.g., SINGLE_LINE_TEXT, NUMBER,
        DATE) |\n| uiMetadata | object | ✅ Yes | Metadata for UI display |\n| uiMetadata.title
        | string | ✅ Yes | Display name shown in the UI |\n|\n---\n\n## 8️⃣ Example Request\n\n```
        bash\ncurl -X PUT https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/columns/{columnId}
        \\\n-H \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\"
        \\\n-d '{\n  \"id\": \"6d9ae325-6fcd-4bd6-a732-b59e424fc095\",\n  \"name\":
        \"question\",\n  \"uiDataType\": \"SINGLE_LINE_TEXT\",\n  \"colOptions\": {},\n
        \ \"uiMetadata\": {\n    \"title\": \"Question\",\n    \"precision\": null\n
        \ }\n}'\n\n ```\n\n---\n\n## 9️⃣ Behavior Summary\n\n``` id=\"behcol3\"\nUpdates
        an existing column's metadata and configuration.\nSupports:\n• Updating internal
        column name  \n• Changing UI data type  \n• Updating display title via uiMetadata
        \ \n• Setting precision for numeric columns  \n• Passing additional column options
        via colOptions  \n• Server-side validation before update  \n\n ```"
      requestBody:
