  /ai/api/v2/knowledge-graph/create:
    post:
      summary: Create Knowledge Graph
      parameters:
        - name: file_id
          in: query
          schema:
            type: string
          example: '{{fileId}}'
        - name: workspace_id
          in: query
          schema:
            type: string
          example: '{{workspaceId}}'
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer <token>
      responses:
        '200':
          description: Create Knowledge Graph
      tags:
        - Knowledge Graph
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nCreates a knowledge\
        \ graph from a specific file within a workspace.\n\n---\n\n## 2\uFE0F\u20E3\
        \ Endpoint\n\n``` bash\nPOST /ai/api/v2/knowledge-graph/create?file_id={file_id}&workspace_id={workspace_id}\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Query Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| file_id | string\
        \ | \u2705 Yes | The ID of the file to create the knowledge graph from |\n\
        | workspace_id | string | \u2705 Yes | Workspace identifier where the knowledge\
        \ graph will be created |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\nRequires\
        \ authentication using:\n\n``` bash\nAuthorization: Bearer <token>\n\n ```\n\n---\n\
        \n## 5\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| --- | --- |\n\
        | Authorization | \u2705 Yes |\n\n---\n\n## 6\uFE0F\u20E3 Example Request\n\
        \n``` bash\ncurl -X POST \"https://kg.datagol.ai/ai/api/v2/knowledge-graph/create?file_id={file_id}&workspace_id={workspace_id}\"\
        \ \\\n-H \"Authorization: Bearer <token>\"\n\n ```\n\n---\n\n## 7\uFE0F\u20E3 Behavior\
        \ Summary\n\n``` id=\"behkg1\"\nCreates a knowledge graph by processing the\
        \ specified file.\nSupports semantic graph construction from workspace file\
        \ content and stores graph metadata for downstream AI processing.\n\n ```"
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example: {}
