      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nChecks the processing\
        \ or creation status of a knowledge graph for a specific file.\n\nUsed to\
        \ monitor asynchronous knowledge graph generation.\n\n---\n\n## 2\uFE0F\u20E3\
        \ Endpoint\n\n``` bash\nGET /ai/api/v2/knowledge-graph/status?file_id={fileId}\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Query Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| file_id | string\
        \ | \u2705 Yes | The ID of the file for which knowledge graph status is requested\
        \ |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\nRequires authentication using:\n\
        \n``` bash\nx-auth-token: <token>\n\n ```\n\n---\n\n## 5\uFE0F\u20E3 Request\
        \ Headers\n\n| Header | Required |\n| --- | --- |\n| x-auth-token | \u2705\
        \ Yes |\n\n---\n\n## 6\uFE0F\u20E3 Example Request\n\n``` bash\ncurl --location\
