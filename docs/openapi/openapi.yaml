        \u20E3 Endpoint\n\n``` bash\nGET /ai/api/v2/knowledge-graph?file_id={file_id}&limit={limit}\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Query Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| file_id | string\
        \ | \u2705 Yes | The ID of the file whose knowledge graph is to be fetched\
        \ |\n| limit | number | \u274C No | Maximum number of nodes/relationships\
        \ to return (default: 100 if not specified) |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\
        \nRequires authentication using:\n\n``` bash\nAuthorization: Bearer <token>\n\n ```\n\
        \n---\n\n## 5\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| ---\
        \ | --- |\n| Authorization | \u2705 Yes |\n\n---\n\n## 6\uFE0F\u20E3 Example\
        \ Request\n\n``` bash\ncurl --location 'https://ai.datagol.ai/ai/api/v2/knowledge-graph?file_id={file_id}&limit={limit}'\
        \ \\\n--header &#x27;Authorization: Bearer <token>&#x27;\n\n ```\n\n---\n\n## 7\uFE0F\
        \u20E3 Behavior Summary\n\n``` id=\"behkg3\"\nReturns knowledge graph data\
        \ including nodes and relationships.\nSupports pagination-like control using\
        \ the limit parameter.\nDefault response size is 100 entities when limit is\
        \ not provided.\n\n ```"
