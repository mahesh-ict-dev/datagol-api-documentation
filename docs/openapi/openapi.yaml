        example: '{{rowId}}'
  /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/column:
    post:
      summary: Generate AI Column
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Generate AI Column
      tags:
        - WorkBook
      description: "# Create AI Generated Column\n\n## 1\uFE0F\u20E3 Overview\n\n\
        **Purpose:**\n\nCreates a new column in a specified workspace table. The column\
        \ can optionally be AI-generated using a configured language model.\n\nWhen\
        \ `aiSettings.enabled = true`, the column becomes a computed AI column that\
        \ auto-generates values based on a prompt and row data.\n\n---\n\n## 2\uFE0F\
        \u20E3 Endpoint\n\n```\nPOST /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/column\n\
        \n ```\n\n### Path Parameters\n\n| Parameter | Type | Required | Description\
        \ |\n| --- | --- | --- | --- |\n| workspaceId | UUID | \u2705 Yes | ID of\
        \ the workspace |\n| tableId | UUID | \u2705 Yes | ID of the target table\
        \ |\n\n---\n\n## 3\uFE0F\u20E3 Authentication\n\nRequires **Bearer Token (JWT)**.\n\
        \n```\nAuthorization: Bearer <access_token>\n\n ```\n\n### Required Permissions\n\
        \nUser must have:\n\n- `CREATE_DATASOURCE` or equivalent column creation permission\n\
        \    \n- Table edit access\n    \n\n---\n\n## 4\uFE0F\u20E3 Request Headers\n\
        \n| Header | Value |\n| --- | --- |\n| Content-Type | application/json |\n\
        | Authorization | Bearer token |\n\n---\n\n## 5\uFE0F\u20E3 Request Body Schema\n\
        \n```\n{  \"name\": \"string\",  \"uiDataType\": \"SINGLE_LINE_TEXT | NUMBER\
        \ | ...\",  \"description\": \"string\",  \"required\": false,  \"uiMetadata\"\
        : {    \"title\": \"string\"  },  \"settings\": {    \"aiSettings\": {   \
        \   \"enabled\": true,      \"prompt\": \"string\",      \"model\": \"string\"\
        ,      \"webAccess\": false    }  }}\n\n ```\n\n---\n\n## 6\uFE0F\u20E3 Field\
        \ Descriptions\n\n### Core Column Fields\n\n| Field | Type | Required | Description\
        \ |\n| --- | --- | --- | --- |\n| name | string | \u2705 | Internal column\
        \ name |\n| uiDataType | enum | \u2705 | Data type of the column |\n| description\
        \ | string | \u274C | Column description |\n| required | boolean | \u274C\
        \ | Whether the column is mandatory |\n| uiMetadata.title | string | \u274C\
        \ | Display name in UI |\n\n---\n\n### \U0001F916 AI Settings (Optional)\n\
        \n| Field | Type | Required | Description |\n| --- | --- | --- | --- |\n|\
        \ enabled | boolean | \u2705 (if aiSettings present) | Enables AI computation\
        \ |\n| prompt | string | \u2705 | Prompt used to generate values |\n| model\
        \ | string | \u2705 | LLM model to use |\n| webAccess | boolean | \u274C |\
        \ Allows external web search (if supported) |\n\n---\n\n## 7\uFE0F\u20E3 Behavior\n\
        \n### If `aiSettings.enabled = false`\n\n- Column behaves as a standard manual\
        \ input column.\n    \n\n### If `aiSettings.enabled = true`\n\n- Column becomes\
        \ computed.\n    \n- Value is generated automatically using:\n    \n    -\
        \ Row context\n        \n    - Prompt\n        \n    - Selected model\n  \
        \      \n- Users may not manually edit values (depending on system rules).\n\
        \    \n- Generation may trigger:\n    \n    - On row creation\n        \n\
        \    - On row update\n        \n    - On manual regeneration\n        \n\n\
        ---\n\n## 8\uFE0F\u20E3 Example \u2013 Create AI Column\n\n```\ncurl -X POST\
        \ \\https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/column\
        \ \\-H \"Authorization: Bearer <token>\" \\-H \"Content-Type: application/json\"\
        \ \\-d &#x27;{  \"name\": \"col\",  \"uiDataType\": \"SINGLE_LINE_TEXT\",\
        \  \"required\": false,  \"settings\": {    \"aiSettings\": {      \"enabled\"\
        : true,      \"prompt\": \"Extract first name from full name\",      \"model\"\
        : \"gpt-4o-mini\",      \"webAccess\": false    }  }}&#x27;\n\n ```\n\n---\n\
        \n## 9\uFE0F\u20E3 Example Use Case\n\nIf table has:\n\n| full_name |\n| ---\
        \ |\n| John Smith |\n| Alice Brown |\n\nAI column prompt:\n\n```\nExtract\
        \ first name from full name\n\n ```\n\nGenerated column:\n\n| full_name |\
        \ first_name |\n| --- | --- |\n| John Smith | John |\n| Alice Brown | Alice\
        \ |\n\n---\n\n## \U0001F51F Response (Example)\n\n```\n{  \"id\": \"column-uuid\"\
        ,  \"name\": \"col\",  \"uiDataType\": \"SINGLE_LINE_TEXT\",  \"aiEnabled\"\
        : true,  \"createdAt\": \"timestamp\"}\n\n ```"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                uiDataType:
                  type: string
                description:
                  type: string
                uiMetadata:
                  type: object
                  properties:
                    title:
                      type: string
                settings:
                  type: object
                  properties:
                    aiSettings:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        prompt:
                          type: string
                        model:
                          type: string
                        webAccess:
                          type: boolean
                name:
                  type: string
            example:
              uiDataType: SINGLE_LINE_TEXT
              description: ''
              uiMetadata:
                title: col
              settings:
                aiSettings:
                  enabled: true
                  prompt: Extract from name and create a col
                  model: gpt-4o-mini
                  webAccess: false
              name: col
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
        example: '{{workspaceId}}'
      - name: workbookId
        in: path
        required: true
        schema:
          type: string
        example: '{{workbookId}}'
