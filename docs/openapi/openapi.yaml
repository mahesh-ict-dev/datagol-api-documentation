        \n``` bash\nGET /noCo/api/v2/workspaces/{workspace_id}/folder\n\n ```\n\n\
        ---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type | Required |\
        \ Description |\n| --- | --- | --- | --- |\n| workspace_id | UUID | \u2705\
        \ Yes | Workspace identifier |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\
        \nRequires authentication using:\n\n``` bash\nAuthorization: Bearer <token>\n\n ```\n\
        \n---\n\n## 5\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| ---\
        \ | --- |\n| Authorization | \u2705 Yes |\n\n---\n\n## 6\uFE0F\u20E3 Example\
        \ Request\n\n``` bash\ncurl -X GET https://be.datagol.ai/noCo/api/v2/workspaces/{workspace_id}/folder\
        \ \\\n-H \"Authorization: Bearer <token>\"\n\n ```\n\n---\n\n## 7\uFE0F\u20E3 Behavior\
        \ Summary\n\n``` id=\"beh2a\"\nRetrieves all folders and files within the\
