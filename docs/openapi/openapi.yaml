      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nRetrieves all active\
        \ extraction configurations associated with a specific element.\n\nSupports\
        \ filtering by:\n\n- COLUMN\n    \n- FILE\n    \n- FOLDER\n    \n\n---\n\n\
        ## 2\uFE0F\u20E3 Endpoint\n\n``` bash\nGET /noCo/api/v2/workspaces/{workspaceId}/extraction/{elementType}/{elementId}\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID\
        \ | \u2705 Yes | Workspace identifier |\n| elementType | string | \u2705 Yes\
        \ | COLUMN / FILE / FOLDER |\n| elementId | string | \u2705 Yes | File, folder,\
        \ or column ID |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\nRequires authentication\
        \ using:\n\n``` bash\nx-auth-token: <token>\n\n ```\n\n---\n\n## 5\uFE0F\u20E3\
        \ Request Headers\n\n| Header | Required |\n| --- | --- |\n| x-auth-token\
        \ | \u2705 Yes |\n\n---\n\n## 6\uFE0F\u20E3 Example Request\n\n``` bash\n\
        curl -X GET \"https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/extraction/{elementType}/{elementId}\"\
        \ \\\n-H \"x-auth-token: <token>\"\n\n ```\n\n---\n\n## 7\uFE0F\u20E3 Behavior\
        \ Summary\n\nReturns all active extraction configurations linked to the specified\
        \ element within the workspace."
