      responses:
        '200':
          description: Upload file in WorkSpace
      tags:
        - Knowledge Graph
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nUploads one or more\
        \ files into a folder within a workspace.\n\nSupports multipart file upload.\n\
        \n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n``` bash\nPOST /noCo/api/v2/workspaces/{workspace_id}/folder/upload\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| workspace_id | UUID\
        \ | \u2705 Yes | Workspace identifier |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\
        \nRequires authentication using:\n\n``` bash\nx-auth-token: <token>\n\n ```\n\
        \n---\n\n## 5\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| ---\
        \ | --- |\n| x-auth-token | \u2705 Yes |\n\nContent-Type will be automatically\
        \ set to:\n\n```\nmultipart/form-data\n\n ```\n\n---\n\n## 6\uFE0F\u20E3 Request\
        \ Body (Form Data)\n\n| Field | Type | Required | Description |\n| --- | ---\
        \ | --- | --- |\n| files | file | \u2705 Yes | File(s) to upload. Supports\
        \ multiple files using multipart/form-data. |\n\n---\n\n## 7\uFE0F\u20E3 Example\
        \ Request\n\n``` bash\ncurl -X POST https://be.datagol.ai/noCo/api/v2/workspaces/{workspace_id}/folder/upload\
        \ \\\n-H \"x-auth-token: <token>\" \\\n-F \"files=@file1.csv\" \\\n-F \"files=@file2.csv\"\
        \n\n ```\n\n---\n\n## 8\uFE0F\u20E3 Behavior Summary\n\n``` id=\"beh1e\"\n\
        Uploads one or more files into a workspace folder.\nSupports:\n\u2022 Multiple\
        \ file uploads in a single request  \n\u2022 Multipart/form-data encoding\
        \  \n\u2022 Workspace-level storage organization  \n\n ```"
    parameters:
      - name: workspace_id
        in: path
        required: true
        schema:
          type: string
        example: '{{workspace_id}}'
