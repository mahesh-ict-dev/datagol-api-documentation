      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**\n\
        \nCreates a new Workbook inside a specified workspace.\n\nThis endpoint creates:\n\
        \n- A new table (workbook container)\n    \n- Basic metadata (title and optional description)\n\
        \    \n- Table type configuration (e.g., DYNAMIC)\n    \n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n```\nPOST /noCo/api/v2/workspaces/{workspaceId}/tables\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID\
        \ | \u2705 Yes | Identifier of the workspace where the workbook will be created\
        \ |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\nRequires **Bearer JWT Token**\n\
        \n```\nAuthorization: Bearer <token>\n\n ```\n\n---\n\n## 5\uFE0F\u20E3\
        \ Required Permissions\n\nUser must have:\n\n- `CREATOR` or EDITOR permission\
        \n\n---\n\n## 6\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| --- |\
        \ --- |\n| Authorization | \u2705 Yes |\n| Content-Type: application/json\
        \ | \u2705 Yes |\n\n---\n\n## 7\uFE0F\u20E3 Request Body Schema\n\n```\n{\
        \  \"title\": \"string\",  \"description\": \"string\",  \"tableType\": \"DYNAMIC | STATIC\"}\n\n ```\n\n---\n\n\
        ## 8\uFE0F\u20E3 Field Descriptions\n\n| Field | Type | Required | Description |\n\
        | --- | --- | --- | --- |\n| title | string | \u2705 Yes | Display name of the workbook |\n\
        | description | string | \u274C | Workbook description |\n| tableType | enum | \u274C\
        \ | Type of table (e.g., DYNAMIC, STATIC) |\n\n---\n\n## 9\uFE0F\u20E3 Example Request\n\n```\ncurl -X POST \\https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables\
        \ \\-H \"Authorization: Bearer <token>\" \\-H \"Content-Type: application/json\"\
        \ \\-d &#x27;{  \"title\": \"Workbook 1\",  \"description\": \"\",  \"tableType\": \"DYNAMIC\"}&#x27;\n\n ```\n\n---\n\n\
        ## \U0001F504 Behavior\n\nWhen this endpoint is called:\n\n1. Validate workspace access\n\
        \    \n2. Create workbook metadata\n    \n3. Initialize table configuration\n    \n4. Persist configuration\n\
        \    \n5. Return created workbook object\n    \n\n---\n\n## \U0001F539 Table\
        \ Type Behavior\n\n| Type | Description |\n| --- | --- |\n| DYNAMIC | Supports\
        \ computed fields, AI columns, formulas |\n| STATIC | Manual data entry only\
        \ |\n\n---\n\n## \u2705 Successful Response Example\n\n```\n{  \"id\": \"generated-table-uuid\",  \"title\": \"Workbook 1\",  \"tableType\": \"DYNAMIC\",  \"createdAt\": \"2026-02-26T13:00:00Z\"}\n\n ```\n\n---\n\n# \U0001F4CC Behavior Summary\n\nThis endpoint:\n\n> Creates a new Workbook (table) with basic metadata inside a workspace; \n  \n\nIt supports:\n\n- Workbook creation with minimal configuration\n    \n- Optional description\n    \n- Table type selection\n"
      requestBody:
