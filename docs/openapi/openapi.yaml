    post:
      summary: Create Extraction
      parameters:
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: c2cccdf27ebaaefeffeedee0ca4cceb9333b4f31e676e4531cc208b9725bc330
      responses:
        '200':
          description: Create Extraction
      tags:
        - AI Extraction
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nCreates an extraction\
        \ configuration inside a workspace.\n\nSupports both **STANDARD** and **ADVANCED**\
        \ extraction modes.\n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n``` bash\nPOST\
        \ /noCo/api/v2/workspaces/{workspaceId}/extraction\n\n ```\n\n---\n\n## 3\uFE0F\
        \u20E3 Path Parameters\n\n| Parameter | Type | Required | Description |\n\
        | --- | --- | --- | --- |\n| workspaceId | UUID | \u2705 Yes | Workspace identifier\
        \ |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\nRequires authentication using:\n\
        \n``` bash\nx-auth-token: <token>\n\n ```\n\n---\n\n## 5\uFE0F\u20E3 Request\
        \ Headers\n\n| Header | Required |\n| --- | --- |\n| x-auth-token | \u2705\
        \ Yes |\n| Content-Type: application/json | \u2705 Yes |\n\n---\n\n## 6\uFE0F\
        \u20E3 Request Body Schema\n\n``` json\n{\n  \"title\": \"string\",\n  \"\
        extractionMode\": \"string\",\n  \"elementType\": \"string\",\n  \"elementId\"\
        : \"string\",\n  \"inputTableId\": \"string\",\n  \"outputConfiguration\"\
        : {},\n  \"columnConfiguration\": [],\n  \"primaryKeyColumnId\": [],\n  \"\
        storeExtractedData\": true,\n  \"scheduleType\": \"string\",\n  \"schedule\"\
        : {},\n  \"advancedSchema\": {}\n}\n\n ```\n\n---\n\n## 7\uFE0F\u20E3 Field\
        \ Descriptions\n\n### Extraction Configuration Fields\n\n| Field | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| title | string |\
        \ \u2705 Yes | Extraction configuration title |\n| extractionMode | string\
        \ | \u2705 Yes | STANDARD or ADVANCED |\n| elementType | string | \u2705 Yes\
        \ | FILE, FOLDER, or COLUMN |\n| elementId | string | Required for COLUMN\
        \ | ID of the column/file/folder |\n| inputTableId | string | Required for\
        \ COLUMN | ID of the Workbook |\n| outputConfiguration | object | \u2705 Yes\
        \ | Output details (title, tableId) |\n| columnConfiguration | array | \u274C\
        \ No | Column definitions |\n| primaryKeyColumnId | array | Required for COLUMN\
        \ | Primary key column IDs |\n| storeExtractedData | boolean | \u274C No |\
        \ Store extracted data flag |\n| scheduleType | string | \u274C No | MANUAL\
        \ |\n| schedule | object | \u274C No | Schedule object with cronExpression\
        \ |\n| advancedSchema | object | Required for ADVANCED | JSON schema for advanced\
        \ extraction |\n\n---\n\n## 8\uFE0F\u20E3 Example Request\n\n``` bash\ncurl\
        \ --location 'https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/extraction'\
        \ \\\n--header &#x27;x-auth-token: <token>&#x27; \\\n--header 'Content-Type:\
        \ application/json' \\\n--data '{\n  \"title\": \"config test\",\n  \"extractionMode\"\
        : \"ADVANCED\",\n  \"elementType\": \"COLUMN\",\n  \"elementId\": \"40743480-286a-4531-b3f3-7d0b68018c9d\"\
        ,\n  \"storeExtractedData\": true,\n  \"scheduleType\": \"MANUAL\",\n  \"\
        schedule\": {\n    \"cronExpression\": \"\"\n  },\n  \"outputConfiguration\"\
        : {\n    \"createNewWorkbook\": true,\n    \"title\": \"sample transcripts\
        \ output\"\n  },\n  \"inputTableId\": \"7963e2b4-dddc-4dd4-8c44-8c70c47da692\"\
        ,\n  \"primaryKeyColumnId\": [\n    \"ee42ef18-0d8a-461e-bae1-4370a8c13fec\"\
        \n  ]\n}'\n\n ```\n\n---\n\n## 9\uFE0F\u20E3 Behavior Summary\n\nCreates an\
        \ extraction configuration within a workspace.\n\nSupports:\n\n- STANDARD\
        \ and ADVANCED extraction modes\n    \n- File, folder, or column-based extraction\n\
        \    \n- Optional scheduling\n    \n- Output workbook configuration\n    \n\
        - Schema-based extraction processing"
