  /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/cursor:
    post:
      summary: Get Workbook Data
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Get Table Data
      tags:
        - WorkBook
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nRetrieves records\
        \ from a workbook within a workspace using **cursor-based pagination**.\n\n\
        Supports:\n\n- Filtering queries\n    \n- Sorting rules\n    \n- Pagination\
        \ traversal\n    \n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n``` bash\nPOST /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/cursor\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID\
        \ | \u2705 Yes | Workspace identifier |\n| workbookId | UUID | \u2705 Yes\
        \ | Workbook identifier |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\nRequires\
        \ authentication using:\n\n``` bash\nAuthorization: Bearer <token>\n\n ```\n\n---\n\
        \n## 5\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| --- | --- |\n\
        | Authorization | \u2705 Yes |\n| Content-Type: application/json | \u2705 Yes\
        \ |\n\n---\n\n## 6\uFE0F\u20E3 Request Body Schema\n\n``` json\n{\n  \"requestPageDetails\"\
        : {\n    \"pageNumber\": 1,\n    \"pageSize\": 500\n  },\n  \"sortOptions\"\
        : [],\n  \"whereClause\": \"string\"\n}\n\n ```\n\n---\n\n## 7\uFE0F\u20E3\
        \ Field Descriptions\n\n### Pagination Configuration\n\n| Field | Type | Required\
        \ | Description |\n| --- | --- | --- | --- |\n| requestPageDetails | object\
        \ | \u2705 Yes | Pagination configuration |\n| requestPageDetails.pageNumber\
        \ | number | \u2705 Yes | Page number to retrieve (increment to fetch next\
        \ page) |\n| requestPageDetails.pageSize | number | \u2705 Yes | Number of\
        \ records per page |\n| sortOptions | array | \u274C No | Sorting rules for\
        \ query results |\n| whereClause | string | \u274C No | SQL-like conditional\
        \ filter expression |\n\n---\n\n## 8\uFE0F\u20E3 Example Request\n\n``` bash\n\
        curl -X POST https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/cursor\
        \ \\\n-H \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\"\
        \ \\\n-d '{\n  \"requestPageDetails\": {\n    \"pageNumber\": 1,\n    \"pageSize\"\
        : 500\n  },\n  \"sortOptions\": [\n    {\n      \"columnName\": \"first_name\"\
        ,\n      \"direction\": \"DESC\"\n    },{\n      \"columnName\": \"last_updated\"\
        ,\n      \"direction\": \"ASC\"\n    } \n  ],\n  \"whereClause\": \"(`first_name`\
        \ like '%d%' and `years_of_experience` > 4 and `start_date` between '2004-01-01'\
        \ and '2009-12-31' and `is_active` = true)\"\n}'\n\n ```\n\n---\n\n## 9\uFE0F\
        \u20E3 Behavior Summary\n\n```\nRetrieves workbook records using cursor-based\
        \ pagination.\nSupports:\n\u2022 Dynamic filtering using whereClause\n\u2022\
        \ Multi-field sorting using sortOptions\n\u2022 Efficient pagination traversal\
        \ using pageNumber and pageSize\n\u2022 Large dataset handling without loading\
        \ entire workbook data\n\n ```"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestPageDetails:
                  type: object
                  properties:
                    pageNumber:
                      type: integer
                    pageSize:
                      type: integer
                sortOptions:
                  type: array
                  items:
                    type: object
                    properties:
                      columnName:
                        type: string
                      direction:
                        type: string
                whereClause:
                  type: string
            example:
              requestPageDetails:
                pageNumber: 1
                pageSize: 500
              sortOptions:
                - columnName: first_name
                  direction: DESC
                - columnName: last_updated
                  direction: ASC
              whereClause: "(`first_name` like '%d%' and `years_of_experience` > 4 and `start_date` between '2004-01-01' and '2009-12-31' and `is_active` = true)"
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
        example: '{{workspaceId}}'
      - name: workbookId
        in: path
        required: true
        schema:
          type: string
        example: '{{workbookId}}'
  /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows:
    post:
      summary: Add Row
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Add Row with Data
      tags:
        - WorkBook
      description: "## 1️⃣ Overview\n\n**Purpose:**  \nAdds a new row to
        a workbook within a workspace.\n\n---\n\n## 2️⃣ Endpoint\n\n```
        bash\nPOST /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows\n\n
  `````````\n\n---\n\n## 3️⃣ Path Parameters\n\n| Parameter | Type |
        Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID
        | ✅ Yes | Workspace identifier |\n| workbookId | UUID | ✅ Yes
        | Workbook identifier |\n\n---\n\n## 4️⃣ Authentication\n\nRequires
        authentication using:\n\n``` bash\nAuthorization: Bearer <token>\n\n ```\n\n---\n\n
        ## 5️⃣ Request Headers\n\n| Header | Required |\n| --- | --- |\n
        | Authorization | ✅ Yes |\n\n---\n\n## 6️⃣ Request Body Schema\n\n```
        json\n{\n  \"cellValues\": {}\n}\n\n ```\n\n---\n\n## 7️⃣
        Field Descriptions\n\n### Row Data\n\n| Field | Type | Required | Description
        |\n| --- | --- | --- | --- |\n| cellValues | object | ✅ Yes | Key-value
        mapping of workbook column internal names to their values |\n\n---\n\n##
        8️⃣ Example Request\n\n``` bash\ncurl -X POST https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows
        \\\n-H \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\"
        \\\n-d '{\n  \"cellValues\": {\n    \"first_name\": \"John\",\n    \"years_of_experience\":
        5,\n    \"is_active\": true,\n    \"start_date\": \"2024-02-18T05:00:00+00:00\"\n
        \ }\n}'\n\n ```\n\n---\n\n## 9️⃣ Behavior Summary\n\n``` id=\"beh1b\"\nInserts
        a new record into the workbook.\nSupports:\n• Dynamic column-value mapping
        using cellValues object  \n• Internal column names must be used as keys  \n•
        Data validation is performed before insertion  \n• Date values must follow
        YYYY-MM-DD format  \n\n ```"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - cellValues
              properties:
                cellValues:
                  type: object
            example:
              cellValues:
                first_name: 'John'
                years_of_experience: 5
                is_active: true
                start_date: '2024-02-18T05:00:00+00:00'
    put:
      summary: Update Row In Workbook
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Update Row In Workbook
      tags:
        - WorkBook
      description: "# 1️⃣ Overview\n\n**Purpose:**\n\nUpdates an existing row in a
        specified table within a workspace.\n\nThis endpoint allows:\n\n- Updating
        one or more column values in a row\n    \n- Triggering AI column regeneration
        (if dependent fields change)\n    \n- Recomputing formulas (if applicable)\n
        \   \n\n---\n\n## 2️⃣ Endpoint\n\n```\nPUT /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows\n\n
  ````````\n\n---\n\n## 3️⃣ Path Parameters\n\n| Parameter | Type | Required |
        Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID | ✅ Yes |
        Identifier of the workspace |\n| workbookId | UUID | ✅ Yes | Identifier
        of the table |\n\n---\n\n## 4️⃣ Authentication\n\nRequires Authorization\n\n```\nAuthorization:
        Bearer <token>\n\n ```\n\n---\n\n## 5️⃣ Required Permissions\n\nUser must
        have:\n\n- Row edit permission\n    \n- Table edit access\n    \n- Workspace
        access\n    \n\nIf row updates affect:\n\n- AI columns → AI execution permission
        required\n    \n- Formula columns → system recalculates automatically\n    \n\n---\n\n##
        6️⃣ Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization
        | ✅ Yes |\n| Content-Type: application/json | ✅ Yes |\n\n## 7️⃣ Request
        Body Schema\n\n```\n{  \"id\": \"number | string\",  \"cellValues\": {    \"columnName\":
        \"value\"  }\n\n ```\n\n---\n\n## 8️⃣ Field Descriptions\n\n| Field | Type
        | Required | Description |\n| --- | --- | --- | --- |\n| id | Row identifier
        | ✅ Yes | Unique row ID |\n| cellValues | Object | ❌ | Key-value map using
        column names |\n\n---\n\n## 9️⃣ Example Request\n\n```\ncurl -X PUT \\https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows
        \\-H \"Authorization: Bearer <token>\" \\-H \"Content-Type: application/json\"
        \\-d '{  \"id\": 1,  \"cellValues\": {    \"name\": \"dega\"  }\n\n ```\n\n---\n\n##
        AI Column Interaction\n\nIf the table contains AI-enabled columns:\n\n- Updating
        dependent fields may:\n    \n    - Automatically regenerate AI values\n        \n
        \   - Trigger asynchronous processing\n        \n- If AI column is manual-override
        enabled:\n    \n    - System may preserve manual values\n        \n\n---\n\n##
        ✅ Validation Rules\n\n- Row ID must exist\n    \n- Cannot update system-generated
        columns\n    \n- Cannot update formula-only columns\n    \n- Data must match
        column type\n    \n- Required columns cannot be null\n    \n\n---\n\n"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - cellValues
              properties:
                id:
                  type: integer
                cellValues:
                  type: object
            example:
              id: 1
              cellValues:
                name: 'dega'
    delete:
      summary: Delete Rows
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Delete Rows
      tags:
        - WorkBook
      description: "## 1️⃣ Overview\n\n**Purpose:**  \nDeletes one or more rows from
        a workbook within a workspace.\n\n---\n\n## 2️⃣ Endpoint\n\n``` bash\nDELETE
        /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows\n\n ```\n\n---\n\n##
        3️⃣ Path Parameters\n\n| Parameter | Type | Required | Description |\n| ---
        | --- | --- | --- |\n| workspaceId | UUID | ✅ Yes | Workspace identifier |\n|
        workbookId | UUID | ✅ Yes | Workbook identifier |\n\n---\n\n## 4️⃣ Authentication\n\nRequires
        authentication using:\n\n``` bash\nAuthorization: Bearer <token>\n\n ```\n\n---\n\n##
        5️⃣ Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization
        | ✅ Yes |\n| Content-Type: application/json | ✅ Yes |\n\n---\n\n## 6️⃣ Request
        Body Schema\n\n``` json\n{\n  \"rowIds\": []\n}\n\n ```\n\n---\n\n## 7️⃣ Field
        Descriptions\n\n### Row Deletion Payload\n\n| Field | Type | Required | Description
        |\n| --- | --- | --- | --- |\n| rowIds | array | ✅ Yes | List of row identifiers
        to delete |\n\n---\n\n## 8️⃣ Example Request\n\n``` bash\ncurl -X DELETE 'https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/rows'
        \\\n-H 'Authorization: Bearer <token>' \\\n-H 'Content-Type: application/json'
        \\\n--data-raw '{\"rowIds\":[40]}'\n\n ```\n\n---\n\n## 9️⃣ Behavior Summary\n\n```\nDeletes
        one or more workbook rows.\nSupports bulk deletion using rowIds array.\nValidation
        Rules:\n• Workbook must exist within workspace.\n• User must have write/delete
        permission.\n• Provided rowIds must be valid.\n\n ```"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rowIds:
                  type: array
                  items:
                    type: integer
            example:
              rowIds:
                - 40
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
        example: '{{workspaceId}}'
      - name: workbookId
        in: path
        required: true
        schema:
          type: string
        example: '{{workbookId}}'

