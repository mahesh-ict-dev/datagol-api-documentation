    delete:
      summary: Delete Extraction
      parameters:
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: c2cccdf27ebaaefeffeedee0ca4cceb9333b4f31e676e4531cc208b9725bc330
      responses:
        '200':
          description: Resource deleted successfully
      tags:
        - AI Extraction
      description: "### 1\uFE0F\u20E3 Overview\n\n**Purpose:** Performs a soft-delete\
        \ on a specific extraction configuration. Instead of removing the record from\
        \ the database entirely, the system flags the extraction as inactive (`active=false`),\
        \ preserving historical logs while removing it from the active workspace view.\n\
        \n### 2\uFE0F\u20E3 Endpoint\n\nHTTP\n\n```\nDELETE /noCo/api/v2/workspaces/{workspaceId}/extraction/{extractionId}\n\
        \n ```\n\n### 3\uFE0F\u20E3 Path Parameters\n\n| **Parameter** | **Type**\
        \ | **Required** | **Description** |  \n| **workspaceId** | UUID | \u2705\
        \ Yes | Identifier of the workspace containing the extraction. |  \n| **extractionId**\
        \ | Long | \u2705 Yes | Unique identifier of the extraction configuration\
        \ to be deleted. |\n\n### 4\uFE0F\u20E3 Authentication\n\nRequires a valid\
        \ authentication token passed in the custom header.\n\nHTTP\n\n```\nx-auth-token:\
        \ <token>\n\n ```\n\n### 5\uFE0F\u20E3 Required Permissions\n\nUser must have:\n\
        \n- **DELETE_DATASOURCE** or equivalent extraction management permissions.\n\
        \    \n- Workspace-level write access.\n    \n\n### 6\uFE0F\u20E3 Request\
        \ Headers\n\n| **Header** | **Required** | **Description** |  \n| **x-auth-token**\
        \ | \u2705 Yes | Your API authentication token. |  \n| **Content-Type** |\
        \ \u274C No | `application/json`. |\n\n### 7\uFE0F\u20E3 Request Body Schema\n\
        \n_This is a DELETE request; no request body is required._\n\n### 8\uFE0F\u20E3\
        \ Field Descriptions (Response)\n\nA successful response typically returns\
        \ a confirmation object or the updated state of the resource.\n\n| **Field**\
        \ | **Type** | **Description** |  \n| **success** | boolean | Indicates if\
        \ the deletion was processed. |  \n| **id** | Long | The ID of the extraction\
        \ that was deactivated. |  \n| **active** | boolean | Will return `false`\
        \ following a successful call. |\n\n### 9\uFE0F\u20E3 Example Request\n\n\
        Bash\n\n```\ncurl -X DELETE \\\n  https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/extraction/550\
        \ \\\n  -H \"x-auth-token: <your_token_here>\"\n\n ```\n\n### \U0001F504 Behavior\n\
        \nWhen this endpoint is called:\n\n- **Validation:** The system verifies that\
        \ the `extractionId` belongs to the specified `workspaceId`.\n    \n- **Soft-Delete:**\
        \ The `active` flag for the extraction configuration is set to `false`.\n\
        \    \n- **Cleanup:** Associated scheduled tasks (if any) are typically paused\
        \ or removed from the active queue.\n    \n\n### \u26A0\uFE0F Validation Rules\n\
        \n- The `workspaceId` must be a valid UUID.\n    \n- The `extractionId` must\
        \ exist and currently be in an `active=true` state for the operation to proceed\
        \ normally."
