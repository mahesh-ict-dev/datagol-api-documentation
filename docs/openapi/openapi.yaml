openapi: 3.0.0
info:
  title: DataGOL APIs
  version: 1.0.0
  description: ''
servers:
  - url: https://be.datagol.ai
  - url: https://be.datagol.ai
  - url: https://kg.datagol.ai
  - url: https://ai.datagol.ai
paths:
  /idp/api/v1/user/token:
    post:
      summary: Generate Authentication Token
      responses:
        '200':
          description: Authentication token generated successfully
      tags:
        - Getting Started
      description: "## 1️⃣ Overview\n\n**Purpose:**  \nGenerates an authentication token\
        \ for a user in the DataGOL Platform.\n\nThis endpoint validates the provided\
        \ user credentials and returns a JWT token that can be used to authenticate\
        \ subsequent API requests.\n\n---\n\n## 2️⃣ Endpoint\n\n``` bash\nPOST /idp/api/v1/user/token\n\
        \n ```\n\nBase URL:\n\n```\nhttps://be.datagol.ai\n\n ```\n\n---\n\n## 3️⃣ Request Headers\n\n\
        | Header | Required |\n| --- | --- |\n| Content-Type: application/json | ✅ Yes |\n\
        \n---\n\n## 4️⃣ Request Body Schema\n\n``` json\n{\n  \"email\": \"string\",\n\
        \  \"password\": \"string\"\n}\n\n ```\n\n---\n\n## 5️⃣ Field Descriptions\n\n\
        ### Token Generation Fields\n\n| Field | Type | Description |\n| --- | --- | --- |\n\
        | email | string | The registered email address (e.g., sample_email@datagol.com). |\n\
        | password | string | The user's account password. |\n\n---\n\n## 6️⃣ Example Request\n\n\
        ``` bash\ncurl -X POST https://be.datagol.ai/idp/api/v1/user/token \\\n-H \"\
        Content-Type: application/json\" \\\n-d '{\n  \"email\": \"sample_email@datagol.com\"\
        ,\n  \"password\": \"UserPassword123\"\n}'\n\n ```\n\n---\n\n## 7️⃣ Example Response\n\n\
        ``` json\n{\n  \"token\": \"eyXXXXXX\"\n\
        }\n\n ```\n\n---\n\n## 8️⃣ Behavior Summary\n\nValidates the provided user credentials\
        \ and generates a JWT authentication token.\n\nThe returned token should be\
        \ used in subsequent API requests for authentication, typically passed in request\
        \ headers."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
            example:
              email: sample_email@datagol.com
              password: password123
  /idp/api/v1/user/login:
    post:
      summary: Login to DataGOL
      responses:
        '200':
          description: Login to DataGOL
      tags:
        - Getting Started
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nAuthenticates a user\
        \ into the DataGOL Platform.\n\nOn success, it returns the user's profile,\
        \ including their administrative roles and assigned permissions within the\
        \ workspace.\n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n``` bash\nPOST /idp/api/v1/user/login\n\
        \n ```\n\nBase URL:\n\n```\nhttps://be.datagol.ai\n\n ```\n\n---\n\n## 3\uFE0F\
        \u20E3 Request Headers\n\n| Header | Required |\n| --- | --- |\n| Content-Type:\
        \ application/json | \u2705 Yes |\n\n---\n\n## 4\uFE0F\u20E3 Request Body\
        \ Schema\n\n``` json\n{\n  \"email\": \"string\",\n  \"password\": \"string\"\
        \n}\n\n ```\n\n---\n\n## 5\uFE0F\u20E3 Field Descriptions\n\n### Login Fields\n\
        \n| Field | Type | Description |\n| --- | --- | --- |\n| email | string |\
        \ The registered email address (e.g., [sample_email@datagol.com](https://mailto:sample_email@datagol.com)).\
        \ |\n| password | string | The user's account password. |\n\n---\n\n## 6\uFE0F\
        \u20E3 Example Request\n\n``` bash\ncurl -X POST https://be.datagol.ai/idp/api/v1/user/login\
        \ \\\n-H \"Content-Type: application/json\" \\\n-d '{\n  \"email\": \"sample_email@datagol.com\"\
        ,\n  \"password\": \"UserPassword123\"\n}'\n\n ```\n\n---\n\n## 7\uFE0F\u20E3\
        \ Behavior Summary\n\nAuthenticates a user into the DataGOL Platform and returns\
        \ the user profile with administrative roles and workspace permissions."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
            example:
              email: sample_email@datagol.com
              password: password123
  /idp/api/v1/company/serviceAccount:
    post:
      summary: Create Service Account
      responses:
        '200':
          description: Create Service Account
      tags:
        - Getting Started
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nCreates a new service\
        \ account within a specific company.\n\nA unique system-generated email (e.g.,\
        \ `@datagol.iam.serviceaccount.com`) is assigned to the account upon creation.\n\
        \n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n``` bash\nPOST /idp/api/v1/company/serviceAccount\n\
        \n ```\n\nBase URL:\n\n```\nhttps://be.datagol.ai\n\n ```\n\n---\n\n## 3\uFE0F\
        \u20E3 Authentication\n\nRequires Bearer Token  \nUser must have `ACCOUNT_ADMIN`\
        \ or similar administrative privileges.\n\n---\n\n## 4\uFE0F\u20E3 Request\
        \ Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization: Bearer\
        \ | \u2705 Yes |\n| Content-Type: application/json | \u2705 Yes |\n\n---\n\
        \n## 5\uFE0F\u20E3 Request Body Schema\n\n``` json\n{\n  \"name\": \"string\"\
        ,\n  \"description\": \"string\"\n}\n\n ```\n\n---\n\n## 6\uFE0F\u20E3 Field\
        \ Descriptions\n\n### Service Account Fields\n\n| Field | Type | Required\
        \ | Description |\n| --- | --- | --- | --- |\n| name | string | \u2705 Yes\
        \ | The unique identifier or display name for the service account with no\
        \ spaces or special characters. |\n| description | string | \u274C No | A\
        \ brief explanation of the account's purpose (can be an empty string). |\n\
        \n---\n\n## 7\uFE0F\u20E3 Example Request\n\n``` bash\ncurl -X POST https://be.datagol.ai/idp/api/v1/company/serviceAccount\
        \ \\\n-H \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\"\
        \ \\\n-d '{\n  \"name\": \"ci_cd_service_account\",\n  \"description\": \"\
        Service account for CI/CD integrations\"\n}'\n\n ```\n\n---\n\n## 8\uFE0F\u20E3\
        \ Behavior Summary\n\nCreates a new service account within the company and\
        \ assigns a unique system-generated email address to it."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
            example:
              name: sample_service_token
              description: ''
  /idp/api/v1/company/serviceAccount/{serviceTokenId}/token/reset:
    get:
      summary: Get Service Token
      parameters:
        - name: neverExpires
          in: query
          schema:
            type: boolean
          example: 'true'
      responses:
        '200':
          description: get service token
      tags:
        - Getting Started
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nResets and regenerates\
        \ the access token for an existing service account.\n\nThe newly generated\
        \ token can optionally be configured to never expire.\n\n---\n\n## 2\uFE0F\
        \u20E3 Endpoint\n\n``` bash\nPOST /idp/api/v1/company/serviceAccount/{serviceAccountId}/token/reset?neverExpires=true\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| serviceAccountId\
        \ | UUID | \u2705 Yes | Identifier of the service account whose token will\
        \ be reset |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\nRequires Bearer\
        \ Token  \nUser must have `ACCOUNT_ADMIN` or similar administrative privileges.\n\
        \n---\n\n## 5\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| ---\
        \ | --- |\n| Authorization: Bearer | \u2705 Yes |\n\n---\n\n## 6\uFE0F\u20E3\
        \ Example Request\n\n``` bash\ncurl -X POST \"https://be.datagol.ai/idp/api/v1/company/serviceAccount/{serviceAccountId}/token/reset?neverExpires=true\"\
        \ \\\n-H \"Authorization: Bearer <token>\"\n\n ```\n\n---\n\n## 7\uFE0F\u20E3\
        \ Behavior Summary\n\nResets the existing service account token and generates\
        \ a new one.  \nIf `neverExpires=true` is provided, the newly generated token\
        \ will not expire."
    parameters:
      - name: serviceTokenId
        in: path
        required: true
        schema:
          type: string
        example: '{{serviceTokenId}}'
  /noCo/api/v2/workspaces:
    post:
      summary: Create Workspace
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer <token>
      responses:
        '200':
          description: create Workspace
      tags:
        - Workspaces
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nCreates a new workspace\
        \ in the DataGOL Platform.\n\nWorkspaces help organize users, resources, and\
        \ configurations within the platform.\n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\
        \n``` bash\nPOST /noCo/api/v2/workspaces\n\n ```\n\n---\n\n## 3\uFE0F\u20E3\
        \ Authentication\n\nRequires authentication using:\n\n``` id=\"l8v3z7\"\n\
        Authorization: Bearer <token>\n\n ```\n\n---\n\n## 4\uFE0F\u20E3 Request Headers\n\
        \n| Header | Required |\n| --- | --- |\n| Authorization | \u2705 Yes |\n| Content-Type:\
        \ application/json | \u2705 Yes |\n\n---\n\n## 5\uFE0F\u20E3 Request Body\
        \ Schema\n\n``` json\n{\n  \"name\": \"string\",\n  \"description\": \"string\"\
        \n}\n\n ```\n\n---\n\n## 6\uFE0F\u20E3 Field Descriptions\n\n### Workspace\
        \ Fields\n\n| Field | Type | Required | Description |\n| --- | --- | --- |\
        \ --- |\n| name | string | \u2705 Yes | The display name of the workspace\
        \ |\n| description | string | \u274C No | A brief description of the workspace\
        \ (can be an empty string) |\n\n---\n\n## 7\uFE0F\u20E3 Example Request\n\n\
        ``` bash\ncurl -X POST https://be.datagol.ai/noCo/api/v2/workspaces \\\n-H\
        \ \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\" \\\n\
        -d '{\n  \"name\": \"Sales Workspace\",\n  \"description\": \"Workspace for\
        \ sales team data\"\n}'\n\n ```\n\n---\n\n## 8\uFE0F\u20E3 Behavior Summary\n\
        \nCreates a new workspace in the DataGOL Platform to organize users, resources,\
        \ and configurations."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
            example:
              name: sample demo workspace
              description: ''
    get:
      summary: Get All Workspaces
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer <token>
      responses:
        '200':
          description: Get All Workspaces
      tags:
        - Workspaces
      description: "## 1️⃣ Overview\n\n**Purpose:**  \nRetrieves the list of all workspaces accessible to the authenticated user or service account.\n\n---\n\n## 2️⃣ Endpoint\n\n``` bash\nGET /noCo/api/v2/workspaces\n\n```\n\n---\n\n## 3️⃣ Authentication\n\nRequires Bearer-style authentication using:\n\n```\nAuthorization: Bearer <token>\n\n```\n\n---\n\n## 4️⃣ Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization | ✅ Yes |\n\n---\n\n## 5️⃣ Example Request\n\n``` bash\ncurl -X GET https://be.datagol.ai/noCo/api/v2/workspaces \\\n-H \"Authorization: Bearer <token>\"\n\n```\n\n---\n\n## 6️⃣ Behavior Summary\n\nThis endpoint returns all workspaces that are accessible to the authenticated user or service account.\n\nIt supports workspace-level access control and filters results based on user permissions."
  /noCo/api/v2/workspaces/{workspaceId}/bulkUsers:
    post:
      summary: Add Service Email to Workspace
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: cb1848f820cf4e5cb81b0cee75f5eab53c39e38d541b990da8aa3f32d116b32b
      responses:
        '200':
          description: Add Service Email to Workspace
      tags:
        - Workspaces
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nAllows adding multiple\
        \ users to a specific workspace in a single request.\n\nEach user is assigned\
        \ a role within the workspace.\n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n```\
        \ bash\nPOST /noCo/api/v2/workspaces/{workspaceId}/bulkUsers\n\n ```\n\n---\n\
        \n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type | Required | Description\
        \ |\n| --- | --- | --- | --- |\n| workspaceId | UUID | \u2705 Yes | Identifier\
        \ of the workspace |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\nRequires\
        \ authentication using:\n\n``` id=\"k6rj3w\"\nAuthorization: Bearer <token>\n\n ```\n\
        \n---\n\n## 5\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| ---\
        \ | --- |\n| Authorization | \u2705 Yes |\n| Content-Type: application/json\
        \ | \u2705 Yes |\n\n---\n\n## 6\uFE0F\u20E3 Request Body Schema\n\n``` json\n\
        {\n  \"workSpaceUsers\": [\n    {\n      \"email\": \"string\",\n      \"\
        role\": \"string\"\n    }\n  ],\n  \"message\": \"string\"\n}\n\n ```\n\n\
        ---\n\n## 7\uFE0F\u20E3 Field Descriptions\n\n### Workspace Users\n\n| Parameter\
        \ | Type | Required | Description |\n| --- | --- | --- | --- |\n| workSpaceUsers\
        \ | array | \u2705 Yes | List of users to be added to the workspace |\n| workSpaceUsers.email\
        \ | string | \u2705 Yes | Email ID of the user |\n| workSpaceUsers.role |\
        \ string | \u2705 Yes | Role assigned in the workspace (CREATOR, EDITOR, VIEWER)\
        \ |\n| message | string | \u274C No | Optional message sent along with the\
        \ invite |\n\n---\n\n## 8\uFE0F\u20E3 Example Request\n\n``` bash\ncurl -X\
        \ POST https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/bulkUsers\
        \ \\\n-H \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\"\
        \ \\\n-d '{\n  \"workSpaceUsers\": [\n    {\n      \"email\": \"user1@datagol.com\"\
        ,\n      \"role\": \"EDITOR\"\n    },\n    {\n      \"email\": \"user2@datagol.com\"\
        ,\n      \"role\": \"VIEWER\"\n    }\n  ],\n  \"message\": \"Workspace access\
        \ invitation\"\n}'\n\n ```\n\n---\n\n## 9\uFE0F\u20E3 Behavior Summary\n\n\
        Enables bulk addition of users to a workspace and assigns roles to each user.\n\
        \nSupports workspace invitation messaging."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                workSpaceUsers:
                  type: array
                  items:
                    type: object
                    properties:
                      email:
                        type: string
                        format: email
                      role:
                        type: string
                message:
                  type: string
            example:
              workSpaceUsers:
                - email: datagol-bd4ffdd8@inncretech.iam.serviceaccount.com
                  role: CREATOR
              message: ''
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
        example: '{{workspaceId}}'
  /noCo/api/v2/workspaces/{workspaceId}/extraction/schema/generate:
    post:
      summary: Generate Schema for Advanced Extraction
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer <token>
      responses:
        '200':
          description: Generate Schema for Advanced Extraction
      tags:
        - AI Extraction
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nGenerates a schema\
        \ based on provided file content or file identifier.\n\nThe schema generation\
        \ is driven by an instruction prompt.\n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\
        \n``` bash\nPOST /noCo/api/v2/workspaces/{workspaceId}/extraction/schema/generate\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID\
        \ | \u2705 Yes | Identifier of the workspace |\n\n---\n\n## 4\uFE0F\u20E3\
        \ Authentication\n\nRequires authentication using:\n\n``` id=\"c3yq8n\"\n\
        Authorization: Bearer <token>\n\n ```\n\n---\n\n## 5\uFE0F\u20E3 Request Headers\n\
        \n| Header | Required |\n| --- | --- |\n| Authorization | \u2705 Yes |\n| Content-Type:\
        \ application/json | \u2705 Yes |\n\n---\n\n## 6\uFE0F\u20E3 Request Body\
        \ Schema\n\n``` json\n{\n  \"prompt\": \"string\",\n  \"content\": \"string\"\
        ,\n  \"fileId\": \"string\"\n}\n\n ```\n\n---\n\n## 7\uFE0F\u20E3 Field Descriptions\n\
        \n### Schema Generation Fields\n\n| Field | Type | Required | Description\
        \ |\n| --- | --- | --- | --- |\n| prompt | string | \u2705 Yes | Instruction\
        \ for schema generation |\n| content | string | \u274C Optional | File content\
        \ (if not using fileId) |\n| fileId | string | \u274C Optional | File ID (if\
        \ not using content) |\n\n---\n\n## 8\uFE0F\u20E3 Example Request\n\n``` bash\n\
        curl -X POST https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/extraction/schema/generate\
        \ \\\n-H \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\"\
        \ \\\n-d '{\n  \"prompt\": \"Extract schema from invoice file\",\n  \"content\"\
        : \"file raw text content here\"\n}'\n\n ```\n\n---\n\n## 9\uFE0F\u20E3 Behavior\
        \ Summary\n\nGenerates a schema using either file content or file ID based\
        \ on the provided prompt instruction."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                content:
                  type: string
            example:
              prompt: extract detailed transcript
              content: "[00:00:02] Sarah Miller: Yeah, great to connect.[00:00:04]\
                \ Mark Thompson: Likewise. So just for context \u2014 Alex and I started\
                \ working together recently. We\u2019re very early, mostly speaking\
                \ with potential users and understanding their pain points.[00:00:18]\
                \ Sarah Miller: Quick intro from my side \u2014 I\u2019ve spent the\
                \ last 10 years in startups. Started in fintech, then built a SaaS\
                \ company focused on workflow tools. Exited last year and now exploring\
                \ the next venture.[00:00:32] Alex Rivera: I\u2019m Alex, engineering\
                \ background. Around 15 years building developer tools and infrastructure\
                \ products. This is my second startup.[00:00:44] John Doe: Nice to\
                \ meet you both. I run a small fund investing in early-stage AI and\
                \ infrastructure companies. Also previously built and bootstrapped\
                \ a company for nearly a decade, so I understand the founder journey\
                \ well.[00:01:00] Sarah Miller: Amazing. So our thesis is simple \u2014\
                \ AI isn\u2019t just speeding up software development, it\u2019s changing\
                \ how software should be built entirely. Instead of static apps, we\u2019\
                re exploring the idea of \u201Csoftware you can summon\u201D \u2014\
                \ lightweight, adaptive tools that exist only when needed. [00:01:20]\
                \ John Doe: Interesting. Who\u2019s the target user?[00:01:23] Alex\
                \ Rivera: Product managers, designers, and technical founders who\
                \ are building tools themselves but feel underserved by existing infrastructure.\
                \ We want to rethink the layer beneath the coding agents.[00:01:38]\
                \ John Doe: Makes sense. The key will be articulating why you, why\
                \ now, and what gives you the right to win.[00:01:46] Sarah Miller:\
                \ Exactly. That\u2019s what we\u2019re refining \u2014 and conversations\
                \ like this really help."
    parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: string
        example: '{{workspaceId}}'
  /noCo/api/v2/workspaces/{workspaceId}/extraction/advanced/test:
    post:
      summary: Test API for Advanced Extraction
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer <token>
      responses:
        '200':
          description: Test API for Advanced Extraction
      tags:
        - AI Extraction
      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nRuns an advanced\
        \ extraction test using inline content or a file identifier.\n\n---\n\n##\
        \ 2\uFE0F\u20E3 Endpoint\n\n``` bash\nPOST /noCo/api/v2/workspaces/{workspaceId}/extraction/advanced/test\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID\
        \ | \u2705 Yes | Identifier of the workspace |\n\n---\n\n## 4\uFE0F\u20E3\
        \ Authentication\n\nRequires authentication using:\n\n``` bash\nAuthorization:\
        \ Bearer <token>\n\n ```\n\n---\n\n## 5\uFE0F\u20E3 Request Headers\n\n| Header |\
        \ Required |\n| --- | --- |\n| Authorization | \u2705 Yes |\n| Content-Type:\
        \ application/json | \u2705 Yes |\n\n---\n\n## 6\uFE0F\u20E3 Request Body\
        \ Schema\n\n``` json\n{\n  \"content\": \"string\",\n  \"advancedSchema\"\
        : {},\n  \"elementId\": \"string\"\n}\n\n ```\n\n---\n\n## 7\uFE0F\u20E3 Field\
        \ Descriptions\n\n### Extraction Test Fields\n\n| Field | Type | Required\
        \ | Description |\n| --- | --- | --- | --- |\n| content | string | \u2705\
        \ Yes | Inline content to test extraction |\n| advancedSchema | object | \u2705\
        \ Yes | JSON schema for advanced extraction |\n| elementId | string | \u274C\
        \ No | File ID for testing instead of content |\n\n---\n\n## 8\uFE0F\u20E3\
        \ Example Request\n\n``` bash\ncurl -X POST https://{base_url}/noCo/api/v2/workspaces/{workspaceId}/extraction/advanced/test\
        \ \\\n-H \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\"\
        \ \\\n-d '{\n  \"content\": \"Sample invoice text\",\n  \"advancedSchema\"\
        : {\n    \"fields\": []\n  }\n}'\n\n ```\n\n---\n\n## 9\uFE0F\u20E3 Behavior\
        \ Summary\n\nPerforms an advanced extraction test using either inline content\
        \ or a file reference."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                advancedSchema:
                  type: object
                  description: User-defined schema for advanced extraction
                  properties:
                    type:
                      type: string
                    properties:
                      type: object
                      additionalProperties: true
                  additionalProperties: true
            example:
