  /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/columns/{columnId}:
    put:
      summary: Update Column
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer <token>
      responses:
        '200':
          description: Column Updated successfully
      tags:
        - WorkBook
      description: "# Update Column\n\n## 1\uFE0F\u20E3 Overview\n\n**Purpose:**\n\
        \nUpdates an existing column\u2019s metadata and configuration within a specified\
        \ table in a workspace.\n\nThis endpoint supports:\n\n- Updating column name\n\
        \    \n- Changing UI metadata (title, precision, etc.)\n    \n- Modifying\
        \ editability flags\n    \n- Updating AI settings (enable/disable AI generation)\n\
        \    \n- Updating backend data type configuration\n    \n\nIf `settings.aiSettings.enabled\
        \ = true`, the column becomes an AI-generated column.\n\nIf set to `false`,\
        \ it behaves as a standard manual column.\n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\
        \n```\nPUT /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/columns/{columnId}\n\
        \n ```\n\n### Path Parameters\n\n| Parameter | Type | Required | Description\
        \ |\n| --- | --- | --- | --- |\n| workspaceId | UUID | \u2705 Yes | Workspace\
        \ identifier |\n| workbookId | UUID | \u2705 Yes | Table identifier |\n| columnId\
        \ | UUID | \u2705 Yes | Column identifier |\n\n---\n\n## 3\uFE0F\u20E3 Authentication\n\
        \nRequires **Bearer JWT Token**\n\n```\nAuthorization: Bearer <access_token>\n\
        \n ```\n\n### Required Permissions\n\nUser must have:\n\n- Table edit permission\n\
        \    \n- Column metadata edit permission\n    \n- AI configuration permission\
        \ (if modifying AI settings)\n    \n\n---\n\n## 4\uFE0F\u20E3 Request Headers\n\
        \n| Header | Value |\n| --- | --- |\n| Content-Type | application/json |\n\
        | Authorization | Bearer token |\n\nBrowser-specific headers are optional\
        \ and not required for backend integrations.\n\n---\n\n## 5\uFE0F\u20E3 Request\
        \ Body Schema\n\n```\n{  \"id\": \"uuid\",  \"name\": \"string\",  \"uiDataType\"\
        : \"SINGLE_LINE_TEXT\",  \"backendDataType\": \"TEXT\",  \"required\": false,\
        \  \"uiMetadata\": {    \"title\": \"string\",    \"precision\": null  },\
        \  \"settings\": {    \"aiSettings\": {      \"enabled\": false,      \"prompt\"\
        : \"string\",      \"model\": \"string\",      \"webAccess\": false    } \
        \ }}\n\n ```\n\n---\n\n## 6\uFE0F\u20E3 Field Descriptions\n\n### Core Properties\n\
        \n| Field | Type | Description |\n| --- | --- | --- |\n| id | UUID | Column\
        \ ID |\n| name | string | Internal column name |\n| uiDataType | enum | UI\
        \ representation type |\n| backendDataType | enum | Database storage type\
        \ |\n| required | boolean | Whether the field is mandatory |\n| uiMetadata.title\
        \ | string | Display name in UI |\n| uiMetadata.precision | number/null |\
        \ Used for numeric types |\n\n---\n\n### Column Behavior Flags\n\n| Field\
        \ | Description |\n| --- | --- |\n| isDataEditable | Allows editing cell values\
        \ |\n| isMetaDataEditable | Allows editing column metadata |\n| isEditable\
        \ | Overall editability |\n| isDataTypeEditable | Allows data type modification\
        \ |\n| isDeletable | Allows column deletion |\n| isColumnLevelFormula | Indicates\
        \ formula column |\n| isDynamicFormula | Indicates dynamic computed column\
        \ |\n| isSystemGenerated | System-created column |\n\n---\n\n### \U0001F916\
        \ AI Settings\n\n| Field | Type | Description |\n| --- | --- | --- |\n| enabled\
        \ | boolean | Enables AI-generated values |\n| prompt | string | Prompt used\
        \ for generation |\n| model | string | LLM model name |\n| webAccess | boolean\
        \ | Enables web search capability |\n\n---\n\n## 7\uFE0F\u20E3 Behavior\n\n\
        ### Standard Column Update\n\nIf:\n\n```\n\"aiSettings\": {  \"enabled\":\
        \ false}\n\n ```\n\n- Column behaves as manual input\n    \n- No AI execution\
        \ triggered\n    \n- Existing values remain unchanged\n    \n\n---\n\n###\
        \ AI Column Update\n\nIf:\n\n```\n\"aiSettings\": {  \"enabled\": true}\n\n\
        \ ```\n\nSystem may:\n\n1. Convert column into AI-computed column\n    \n\
        2. Trigger regeneration (depending on implementation)\n    \n3. Restrict manual\
        \ edits (if system enforces computed-only mode)\n    \n\n---\n\n## 8\uFE0F\
        \u20E3 Example Request\n\n```\ncurl -X PUT \\https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/columns/{columnId}\
        \ \\-H \"Authorization: Bearer Bearer <token>\" \\-H \"Content-Type: application/json\"\
        \ \\-d &#x27;{  \"name\": \"question\",  \"uiDataType\": \"SINGLE_LINE_TEXT\"\
        ,  \"backendDataType\": \"TEXT\",  \"required\": false,  \"uiMetadata\": {\
        \    \"title\": \"Question\"  },  \"settings\": {    \"aiSettings\": {   \
        \   \"enabled\": false,      \"prompt\": \"\",      \"model\": \"gpt-4o-mini\"\
        ,      \"webAccess\": false    }  }}&#x27;\n\n ```\n\n---\n\n## 9\uFE0F\u20E3\
        \ Example Response\n\n```\n{  \"id\": \"6d9ae325-6fcd-4bd6-a732-b59e424fc095\"\
        ,  \"name\": \"question\",  \"uiDataType\": \"SINGLE_LINE_TEXT\",  \"backendDataType\"\
        : \"TEXT\",  \"required\": false,  \"aiEnabled\": false,  \"updatedAt\": \"\
        2026-02-19T18:25:44.010Z\"}\n\n ```\n\n---\n\n# \U0001F504 Column Update Lifecycle\n\
        \nWhen this endpoint is called:\n\n1. Validate workspace access\n    \n2.\
        \ Validate table ownership\n    \n3. Validate column existence\n    \n4. Check\
        \ editability flags\n    \n5. Apply metadata changes\n    \n6. If AI settings\
        \ changed:\n    \n    - Update AI config\n        \n    - Optionally trigger\
        \ regeneration\n        \n7. Persist changes\n    \n8. Return updated column\
        \ object\n    \n\n---\n\n# \u26A0\uFE0F Validation Rules\n\n- `name` must\
        \ be unique within the table\n    \n- Data type changes may be restricted\
        \ if data exists\n    \n- AI prompt length may be limited\n    \n- Unsupported\
        \ model values return validation error\n    \n- System-generated columns may\
        \ not be editable\n    \n\n---\n\n# \U0001F4CC Summary\n\nThis endpoint:\n\
        \n> &lt;p &gt;Updates an existing column\u2019s metadata, data type, behavior\
        \ flags, and AI configuration within a workspace table.&lt;/p&gt; \n  \n\n\
        It supports both:\n\n- Standard column updates\n    \n- Converting a column\
        \ to or from an AI-generated column"
