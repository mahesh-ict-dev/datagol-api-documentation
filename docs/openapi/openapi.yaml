      responses:
        '200':
          description: Column Deleted Successfully
      tags:
        - WorkBook
      description: "## 1️⃣ Overview\n\n**Purpose:**  \nDeletes an existing column from
        a specified table within a workspace.\n\n---\n\n## 2️⃣ Endpoint\n\n``` bash\nDELETE
        /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/columns/{columnId}\n\n
  ````\n\n---\n\n## 3️⃣ Path Parameters\n\n| Parameter | Type | Required | Description
        |\n| --- | --- | --- | --- |\n| workspaceId | UUID | ✅ Yes | Workspace identifier
        |\n| workbookId | UUID | ✅ Yes | Table identifier |\n| columnId | UUID | ✅
        Yes | Identifier of the column to delete |\n\n---\n\n## 4️⃣ Authentication\n\nRequires
        **Bearer JWT Token**\n\n```\nAuthorization: Bearer <token>\n\n ```\n\n---\n\n##
        5️⃣ Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization
        | ✅ Yes |\n| Content-Type: application/json | ✅ Yes |\n\n---\n\n## 6️⃣ Request
        Body\n\nNo request body required. The column to delete is identified entirely
        by the `columnId` path parameter.\n\n---\n\n## 7️⃣ Example Request\n\n``` bash\ncurl
        -X DELETE 'https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/columns/{columnId}'
        \\\n-H 'Authorization: Bearer <token>' \\\n-H 'Content-Type: application/json'\n\n
  ```\n\n---\n\n## 8️⃣ Behavior Summary\n\n``` id=\"behcol4\"\nDeletes a column
        from the specified workbook table.\nValidation Rules:\n• workspaceId, workbookId,
        and columnId must all be valid  \n• User must have delete permission on the
        column  \n• System-generated or formula columns may not be deletable  \n• Deletion
        is permanent — column data cannot be recovered  \n\n ```"
