  /noCo/api/v2/workspaces/{workspace_id}/tables/{table_id}/column:
    post:
      summary: Create Link Column with Auto Join Condition
      tags:
        - Links & Joins
      security:
        - bearerAuth: [ ]
      description: "## 1️⃣ Overview\n\n**Purpose:**\nCreates a new LINK type column with an automatic join condition between the parent and child tables. Unlike a manual link, this allows defining column-level join conditions that filter how records are linked.\n\nThis endpoint supports:\n- Defining join conditions between columns of two tables\n- Using operators like `EQUALS` for condition matching\n- Passing a raw SQL-style `whereClause` and `formula` for backend filtering\n\n---\n\n## 2️⃣ Endpoint\n\n```\nPOST /noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/column\n```\n\n---\n\n## 3️⃣ Path Parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID | ✅ Yes | Workspace identifier |\n| tableId | UUID | ✅ Yes | Source (parent) table identifier |\n\n---\n\n## 4️⃣ Authentication\n\nRequires **Bearer JWT Token**\n\n```\nAuthorization: Bearer <token>\n```\n\n---\n\n## 5️⃣ Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization | ✅ Yes |\n| Content-Type: application/json | ✅ Yes |\n\n---\n\n## 6️⃣ Request Body Schema\n\n```json\n{\n  \"uiDataType\": \"LINK\",\n  \"colOptions\": {\n    \"associateTableId\": \"uuid\",\n    \"whereClause\": \"string\"\n  },\n  \"uiMetadata\": {\n    \"title\": \"string\",\n    \"autoJoinConfig\": {\n      \"joinConditions\": [\n        {\n          \"id\": \"string\",\n          \"currentTableColumn\": \"string\",\n          \"linkedTableColumn\": \"string\",\n          \"operator\": \"EQUALS\"\n        }\n      ],\n      \"isSwapped\": false\n    }\n  },\n   \"formula\": \"string\",\n  \"name\": \"string\"\n}\n```\n\n---\n\n## 7️⃣ Field Descriptions\n\n| Field | Type | Required | Description |\n| --- | --- | --- | --- |\n| uiDataType | string | ✅ Yes | Must be `LINK` |\n| colOptions.associateTableId | UUID | ✅ Yes | The child or linked table ID |\n| colOptions.whereClause | string | ✅ Yes | Raw SQL-style condition used for backend join filtering |\n| uiMetadata.title | string | ✅ Yes | Display name shown in the UI |\n| uiMetadata.autoJoinConfig | object | ✅ Yes | Configuration object defining the auto join conditions |\n| uiMetadata.autoJoinConfig.joinConditions | array | ✅ Yes | List of join condition objects |\n| uiMetadata.autoJoinConfig.joinConditions[].id | string | ✅ Yes | Unique identifier for the condition (client-generated) |\n| uiMetadata.autoJoinConfig.joinConditions[].currentTableColumn | string | ✅ Yes | Column name from the current (source) table to join on |\n| uiMetadata.autoJoinConfig.joinConditions[].linkedTableColumn | string | ✅ Yes | Column name from the linked (destination) table to join on |\n| uiMetadata.autoJoinConfig.joinConditions[].operator | string | ✅ Yes | Join operator — currently supports `EQUALS` |\n| uiMetadata.autoJoinConfig.isSwapped | boolean | ❌ No | Whether the join direction is swapped. Defaults to `false`  |\n| formula | string | ✅ Yes | Raw SQL-style formula matching the whereClause, used for backend processing |\n| name | string | ✅ Yes | Internal column name — must be unique within the table |"
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Workspace identifier
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Source (parent) table identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - uiDataType
                - colOptions
                - uiMetadata
                - formula
                - name
              properties:
                uiDataType:
                  type: string
                  enum: [ LINK ]
                colOptions:
                  type: object
                  required:
                    - associateTableId
                    - whereClause
                  properties:
                    associateTableId:
                      type: string
                      format: uuid
                      description: The child or linked table ID
                    whereClause:
                      type: string
                      description: Raw SQL-style condition used for backend join filtering
                uiMetadata:
                  type: object
                  required:
                    - title
                    - autoJoinConfig
                  properties:
                    title:
                      type: string
                      description: Display name shown in the UI
                    autoJoinConfig:
                      type: object
                      properties:
                        joinConditions:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                description: Unique identifier for the condition (client-generated)
                              currentTableColumn:
                                type: string
                                description: Column name from the current (source) table to join on
                              linkedTableColumn:
                                type: string
                                description: Column name from the linked (destination) table to join on
                              operator:
                                type: string
                                enum: [ EQUALS ]
                                description: Join operator
                        isSwapped:
                          type: boolean
                          description: Whether the join direction is swapped. Defaults to false
                formula:
                  type: string
                  description: Raw SQL-style formula matching the whereClause, used for backend processing
                name:
                  type: string
                  description: Internal column name — must be unique within the table
            example:
              uiDataType: LINK
              colOptions:
                associateTableId: 6d85b345-b626-4b87-b664-66237d7333e8
                whereClause: table_1e67d485."course_taken" = table_c8be6d9c."status"
              uiMetadata:
                title: product link column
                autoJoinConfig:
                  joinConditions:
                    - id: condition-1774312716137
                      currentTableColumn: course_taken
                      linkedTableColumn: status
                      operator: EQUALS
                  isSwapped: false
              formula: table_1e67d485."course_taken" = table_c8be6d9c."status"
              name: product_link_column
      responses:
        '200':
          description: Link column with auto join condition created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: Unique identifier of the created link column
                  name:
                    type: string
                    description: Internal column name, unique within the table
                  uiDataType:
                    type: string
                    description: Always returns `LINK` for link columns
                  formula:
                    type: string
                    description: Raw SQL-style formula used for the join condition
                  backendDataType:
                    type: string
                    description: Underlying database data type assigned to the column
                  workspaceId:
                    type: string
                    format: uuid
                    description: Workspace this column belongs to
                  colOptions:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: Unique identifier of the colOptions record
                      relationType:
                        type: string
                        description: Relation type resolved by the server — HAS_MANY, ONE_TO_ONE, or MANY_TO_MANY
                      columnId:
                        type: string
                        format: uuid
                        description: ID of the link column in the source (parent) table
                      associatedColumnId:
                        type: string
                        format: uuid
                        description: ID of the auto-created reciprocal column in the child table
                      tableId:
                        type: string
                        format: uuid
                        description: Source table ID where the link column was created
                      associateTableId:
                        type: string
                        format: uuid
                        description: Destination (child) table ID
                      childColumnId:
                        type: string
                        format: uuid
                        description: ID of the primary key column in the child (destination) table, used to establish the foreign key relationship
                      parentColumnId:
                        type: string
                        format: uuid
                        description: ID of the primary key column in the parent (source) table, used to establish the foreign key relationship
                      whereClause:
                        type: string
                        description: Raw SQL-style condition used for backend join filtering
                      isItSource:
                        type: boolean
                        description: True if this column is the source side of the relationship
                  uiMetadata:
                    type: object
                    properties:
                      title:
                        type: string
                        description: Display name shown in the UI
                      autoJoinConfig:
                        type: object
                        properties:
                          joinConditions:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                currentTableColumn:
                                  type: string
                                linkedTableColumn:
                                  type: string
                                operator:
                                  type: string
                          isSwapped:
                            type: boolean
                  tableId:
                    type: string
                    format: uuid
                    description: Table ID where this column resides
              example:
                id: efdbce09-6581-4811-aa67-14344e7444b7
                name: product link column
                uiDataType: LINK
                formula: table_1e67d485."course_taken" = table_c8be6d9c."status"
                backendDataType: VARCHAR(255)
                workspaceId: 16231f3f-8208-4c51-a460-87d17244344f
                colOptions:
                  id: e19ab19c-3a38-4d28-9eff-767019524186
                  relationType: MANY_TO_MANY
                  columnId: efdbce09-6581-4811-aa67-14344e7444b7
                  associatedColumnId: 9422e52d-9886-431e-946f-8ed5a8838dac
                  tableId: 9c8a448d-7884-4158-bfca-202bc95b0515
                  associateTableId: 6d85b345-b626-4b87-b664-66237d7333e8
                  childColumnId: 75272cd2-63c4-4d4c-b2eb-20a864834a2a
                  parentColumnId: f830fd3f-8624-4ae5-959f-36f1756d828a
                  whereClause: table_1e67d485."course_taken" = table_c8be6d9c."status"
                  isItSource: true
                uiMetadata:
                  title: product_link_column
                  autoJoinConfig:
                    joinConditions:
                      - id: condition-1774312716137
                        currentTableColumn: course_taken
                        linkedTableColumn: status
                        operator: EQUALS
                    isSwapped: false
                tableId: 9c8a448d-7884-4158-bfca-202bc95b0515

  /noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/columns:
    post:
      summary: Add Lookup Column
      tags:
        - Links & Joins
      security:
        - bearerAuth: []
      description: "## 1️⃣ Overview\n\n**Purpose:**\nAdds one or more LOOKUP type columns to a specified table. A lookup column pulls field values from a linked (associated) table via an existing LINK column.\n\n---\n\n## 2️⃣ Endpoint\n\n```\nPOST /noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/columns\n```\n\n---\n\n## 3️⃣ Path Parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID | ✅ Yes | Workspace identifier |\n| tableId | UUID | ✅ Yes | Table identifier where the lookup column will be created |\n\n---\n\n## 4️⃣ Authentication\n\nRequires **Bearer JWT Token**\n\n```\nAuthorization: Bearer <token>\n```\n\n---\n\n## 5️⃣ Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization | ✅ Yes |\n| Content-Type: application/json | ✅ Yes |\n\n---\n\n## 6️⃣ Request Body Schema\n\n```json\n{\n  \"columns\": [\n    {\n      \"description\": \"string\",\n      \"uiMetadata\": {\n        \"title\": \"string\"\n      },\n      \"uiDataType\": \"LOOKUP\",\n      \"colOptions\": {\n        \"linkColumnId\": \"uuid\",\n        \"lookupColumnId\": \"uuid\"\n      },\n      \"name\": \"string\"\n    }\n  ]\n}\n```\n\n---\n\n## 7️⃣ Field Descriptions\n\n| Field | Type | Required | Description |\n| --- | --- | --- | --- |\n| columns | array | ✅ Yes | Array of lookup column definitions to create |\n| columns[].description | string | ❌ No | Optional description of the column |\n| columns[].uiMetadata.title | string | ✅ Yes | Display name shown in the UI |\n| columns[].uiDataType | string | ✅ Yes | Must be `LOOKUP` |\n| columns[].colOptions.linkColumnId | UUID | ✅ Yes | ID of the existing LINK column connecting to the source table |\n| columns[].colOptions.lookupColumnId | UUID | ✅ Yes | ID of the column in the linked table whose values should be looked up |\n| columns[].name | string | ✅ Yes | Internal column name — must be unique within the table |\n\n---\n\n## 8️⃣ Example Request\n\n```bash\ncurl -X POST https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/columns \\\n-H \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\" \\\n-d '{\n  \"columns\": [\n    {\n      \"description\": \"\",\n      \"uiMetadata\": {\n        \"title\": \"Name (from People)\"\n      },\n      \"uiDataType\": \"LOOKUP\",\n      \"colOptions\": {\n        \"linkColumnId\": \"21224153-2f85-4b24-a306-4cfbc7e73f70\",\n        \"lookupColumnId\": \"9b5e408d-69bb-42ca-8fa4-ba00f7994356\"\n      },\n      \"name\": \"name_1774285509977\"\n    }\n  ]\n}'\n```\n\n---\n\n## 9️⃣ Behavior Summary\n\n```\nCreates one or more LOOKUP columns in the target table.\nSupports:\n• Batch creation of multiple lookup columns in one request\n• linkColumnId — references the existing LINK column in the current table\n• lookupColumnId — references the column from the linked table to display\n• Column name must be unique within the table\n```"
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Workspace identifier
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Table identifier where the lookup column will be created
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - columns
              properties:
                columns:
                  type: array
                  items:
                    type: object
                    required:
                      - uiDataType
                      - uiMetadata
                      - colOptions
                      - name
                    properties:
                      description:
                        type: string
                      uiMetadata:
                        type: object
                        properties:
                          title:
                            type: string
                      uiDataType:
                        type: string
                        enum: [LOOKUP]
                      colOptions:
                        type: object
                        required:
                          - linkColumnId
                          - lookupColumnId
                        properties:
                          linkColumnId:
                            type: string
                            format: uuid
                            description: ID of the existing LINK column in the current table
                          lookupColumnId:
                            type: string
                            format: uuid
                            description: ID of the column in the linked table to look up
                      name:
                        type: string
            example:
              columns:
                - description: ""
                  uiMetadata:
                    title: lookup column
                  uiDataType: LOOKUP
                  colOptions:
                    linkColumnId: 21224153-2f85-4b24-a306-4cfbc7e73f70
                    lookupColumnId: 9b5e408d-69bb-42ca-8fa4-ba00f7994356
                  name: lookup_column
      responses:
        '200':
          description: Lookup column(s) created successfully
  /noCo/api/v2/workspaces/{workspaceId}/tables/{workbook_id}/rows:
    post:
      summary: Add Row with Linked Records
      tags:
        - Links & Joins
      security:
        - bearerAuth: [ ]
      description: "## 1️⃣ Overview\n\n**Purpose:**\nCreates a new row in the specified table and simultaneously links it to one or more records in associated tables via existing LINK columns.\n\nThis endpoint supports:\n- Setting cell values for the new row at creation time\n- Linking the new row to existing records in associated tables using `linkColumnId`\n- Multiple link relations can be established in a single request\n\n---\n\n## 2️⃣ Endpoint\n\n```\nPOST /noCo/api/v2/workspaces/{workspaceId}/tables/{workbook_id}/rows\n```\n\n---\n\n## 3️⃣ Path Parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID | ✅ Yes | Workspace identifier |\n| workbook_id | UUID | ✅ Yes |  workbook where the row will be created |\n\n---\n\n## 4️⃣ Authentication\n\nRequires **Bearer JWT Token**\n\n```\nAuthorization: Bearer <token>\n```\n\n---\n\n## 5️⃣ Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization | ✅ Yes |\n| Content-Type: application/json | ✅ Yes |\n\n---\n\n## 6️⃣ Request Body Schema\n\n```json\n{\n  \"cellValues\": {\n    \"<columnName>\": \"<value>\"\n  },\n  \"linkRecords\": [\n    {\n      \"destinationRecordId\": \"integer\",\n      \"linkColumnId\": \"uuid\"\n    }\n  ]\n}\n```\n\n---\n\n## 7️⃣ Field Descriptions\n\n| Field | Type | Required | Description |\n| --- | --- | --- | --- |\n| cellValues | object | ✅ Yes | Key-value map of column names and their values for the new row |\n| cellValues.\\<columnName\\> | any | ❌ No | Value for a specific column — pass empty string or empty array if no value |\n| linkRecords | array | ❌ No | List of link operations to perform when creating the row |\n| linkRecords[].destinationRecordId | integer | ✅ Yes | PK of the record in the associated table to link to |\n| linkRecords[].linkColumnId | UUID | ✅ Yes | ID of the LINK column that defines the relation |"
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Workspace identifier
        - name: workbook_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target table identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cellValues
              properties:
                cellValues:
                  type: object
                  description: Key-value map of column names and their initial values for the new row
                  additionalProperties:
                    oneOf:
                      - type: string
                      - type: array
                        items:
                          type: string
                linkRecords:
                  type: array
                  description: List of link operations to attach when creating the row
                  items:
                    type: object
                    required:
                      - destinationRecordId
                      - linkColumnId
                    properties:
                      destinationRecordId:
                        type: integer
                        description: PK of the record in the associated table to link to
                      linkColumnId:
                        type: string
                        format: uuid
                        description: ID of the LINK column that defines the relation
            example:
              cellValues:
                name: ""
                notes: ""
              linkRecords:
                - destinationRecordId: 2
                  linkColumnId: "ed7584c6-a33a-4779-b7bb-03a5d1345bb2"
      responses:
        '200':
          description: Row created and linked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Auto-generated primary key of the newly created row
                  cellValues:
                    type: object
                    description: The column values stored for the new row
                    additionalProperties:
                      oneOf:
                        - type: string
                        - type: array
                          items:
                            type: string
                  linkRecords:
                    type: array
                    description: Confirmation of link relations established
                    items:
                      type: object
                      properties:
                        destinationRecordId:
                          type: integer
                          description: PK of the linked record in the associated table
                        linkColumnId:
                          type: string
                          format: uuid
                          description: LINK column ID used to establish the relation
              example:
                id: 101
                cellValues:
                  name: ""
                  notes: ""
                linkRecords:
                  - destinationRecordId: 2
                    linkColumnId: "ed7584c6-a33a-4779-b7bb-03a5d1345bb2"
  /noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/linkTables:
    get:
      summary: Get All Link Tables of Current Table
      tags:
        - Links & Joins
      security:
        - bearerAuth: [ ]
      description: "## 1️⃣ Overview\n\n**Purpose:**\nRetrieves all tables that are linked to a specified table within a workspace. Useful for discovering all relationships (link columns) associated with a table.\n\n---\n\n## 2️⃣ Endpoint\n\n```\nGET /noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/linkTables\n```\n\n---\n\n## 3️⃣ Path Parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID | ✅ Yes | Workspace identifier |\n| tableId | UUID | ✅ Yes | Table identifier to query linked tables for |\n\n---\n\n## 4️⃣ Authentication\n\nRequires **Bearer JWT Token**\n\n```\nAuthorization: Bearer <token>\n```\n\n---\n\n## 5️⃣ Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization | ✅ Yes |\n| Content-Type: application/json | ✅ Yes |\n\n---\n\n## 6️⃣ Example Request\n\n```bash\ncurl -X GET https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{tableId}/linkTables \\\n-H \"Authorization: Bearer <token>\"\n```\n\n---\n\n## 7️⃣ Behavior Summary\n\n```\nReturns all tables linked to the specified table.\nIncludes metadata about link columns and relation types.\n```"
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Workspace identifier
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Table identifier to query linked tables for
      responses:
        '200':
          description: Linked tables retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                      description: Unique identifier of the linked table
                    workspaceId:
                      type: string
                      format: uuid
                      description: Workspace this table belongs to
                    tableName:
                      type: string
                      description: Internal system name of the table
                    title:
                      type: string
                      description: Display name of the table shown in the UI
                    description:
                      type: string
                      description: Optional description of the table
                    columns:
                      type: array
