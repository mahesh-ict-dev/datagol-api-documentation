      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nRetrieves records\
        \ from a workbook within a workspace using **cursor-based pagination**.\n\n\
        Supports:\n\n- Filtering queries\n    \n- Sorting rules\n    \n- Pagination\
        \ traversal\n    \n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n``` bash\nPOST /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/cursor\n\
        \n ```\n\n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type |\
        \ Required | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID\
        \ | \u2705 Yes | Workspace identifier |\n| workbookId | UUID | \u2705 Yes\
        \ | Workbook identifier |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\nRequires\
        \ authentication using:\n\n``` bash\nAuthorization: Bearer <token>\n\n ```\n\n---\n\
        \n## 5\uFE0F\u20E3 Request Headers\n\n| Header | Required |\n| --- | --- |\n\
        | Authorization | \u2705 Yes |\n| Content-Type: application/json | \u2705 Yes\
        \ |\n\n---\n\n## 6\uFE0F\u20E3 Request Body Schema\n\n``` json\n{\n  \"requestPageDetails\"\
        : {\n    \"pageNumber\": 1,\n    \"pageSize\": 500\n  },\n  \"sortOptions\"\
        : [],\n  \"whereClause\": \"string\"\n}\n\n ```\n\n---\n\n## 7\uFE0F\u20E3\
        \ Field Descriptions\n\n### Pagination Configuration\n\n| Field | Type | Required\
        \ | Description |\n| --- | --- | --- | --- |\n| requestPageDetails | object\
        \ | \u2705 Yes | Pagination configuration |\n| requestPageDetails.pageNumber\
        \ | number | \u2705 Yes | Page number to retrieve (increment to fetch next\
        \ page) |\n| requestPageDetails.pageSize | number | \u2705 Yes | Number of\
        \ records per page |\n| sortOptions | array | \u274C No | Sorting rules for\
        \ query results |\n| whereClause | string | \u274C No | SQL-like conditional\
        \ filter expression |\n\n---\n\n## 8\uFE0F\u20E3 Example Request\n\n``` bash\n\
        curl -X POST https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/cursor\
        \ \\\n-H \"Authorization: Bearer <token>\" \\\n-H \"Content-Type: application/json\"\
        \ \\\n-d '{\n  \"requestPageDetails\": {\n    \"pageNumber\": 1,\n    \"pageSize\"\
        : 500\n  },\n  \"sortOptions\": [\n    {\n      \"columnName\": \"first_name\"\
        ,\n      \"direction\": \"DESC\"\n    }\n  ],\n  \"whereClause\": \"(`first_name`\
        \ like '%d%' and `years_of_experience` > 4 and `start_date` between '2004-01-01'\
        \ and '2009-12-31' and `is_active` = true)\"\n}'\n\n ```\n\n---\n\n## 9\uFE0F\
        \u20E3 Behavior Summary\n\n```\nRetrieves workbook records using cursor-based\
        \ pagination.\nSupports:\n\u2022 Dynamic filtering using whereClause\n\u2022\
        \ Multi-field sorting using sortOptions\n\u2022 Efficient pagination traversal\
        \ using pageNumber and pageSize\n\u2022 Large dataset handling without loading\
        \ entire workbook data\n\n ```"
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example: "{\n    \"requestPageDetails\": {\n        \"pageNumber\": 1,\n\
              \        \"pageSize\": 500\n    },\n    \"sortOptions\": [{\n      \"\
              columnName\": \"first_name\",\n      \"direction\": \"DESC\"\n    }],\n\
              \    \"whereClause\": \"(`first_name` like '%d%' and `years_of_experience`\
              \ > 4 and `start_date` between '2004-01-01' and '2009-12-31' and `is_active`\
              \ = true)\"\n    // date should be in YYYY-MM-DD format\n}"
