      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Poll Status

  /noCo/api/v2/workspaces/{workspaceId}/extraction/{extractionId}:
    delete:
      summary: Delete Extraction
      tags:
        - AI Extraction
      security:
        - bearerAuth: [ ]
      description: |
        ### 1️⃣ Overview

        **Purpose:**  
        Performs a soft-delete on a specific extraction configuration. Instead of removing the record from the database entirely, the system flags the extraction as inactive (`active=false`), preserving historical logs while removing it from the active workspace view.

        ### 2️⃣ Endpoint

        ```http
        DELETE /noCo/api/v2/workspaces/{workspaceId}/extraction/{extractionId}
        ```
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: extractionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
