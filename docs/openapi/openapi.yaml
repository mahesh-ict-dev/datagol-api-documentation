      description: "## 1\uFE0F\u20E3 Overview\n\n**Purpose:**  \nCreates a new column\
        \ inside a workbook.\n\nSupports multiple column types such as:\n\n- Text\
        \ column\n    \n- Number column\n    \n- Date column\n    \n- Other supported\
        \ UI data types\n    \n\n---\n\n## 2\uFE0F\u20E3 Endpoint\n\n``` bash\nPOST\
        \ /noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/column\n\n ```\n\
        \n---\n\n## 3\uFE0F\u20E3 Path Parameters\n\n| Parameter | Type | Required\
        \ | Description |\n| --- | --- | --- | --- |\n| workspaceId | UUID | \u2705\
        \ Yes | Workspace identifier |\n| workbookId | UUID | \u2705 Yes | Workbook\
        \ identifier |\n\n---\n\n## 4\uFE0F\u20E3 Authentication\n\nRequires authentication\
        \ using:\n\n``` bash\nAuthorization: Bearer <token>\n\n ```\n\n---\n\n## 5\uFE0F\u20E3\
        \ Request Headers\n\n| Header | Required |\n| --- | --- |\n| Authorization\
        \ | \u2705 Yes |\n| Content-Type: application/json | \u2705 Yes |\n\n---\n\
        \n## 6\uFE0F\u20E3 Request Body Schema\n\n``` json\n{\n  \"uiDataType\": \"\
        string\",\n  \"uiMetadata\": {},\n  \"name\": \"string\"\n}\n\n ```\n\n---\n\
        \n## 7\uFE0F\u20E3 Field Descriptions\n\n### Column Configuration\n\n| Field\
        \ | Type | Required | Description |\n| --- | --- | --- | --- |\n| uiDataType\
        \ | string | \u2705 Yes | Column type (e.g., SINGLE_LINE_TEXT, NUMBER, DATE\
        \ etc.) |\n| uiMetadata | object | \u2705 Yes | Metadata for UI display (e.g.,\
        \ `{ \"title\": \"My Column\" }`) |\n| name | string | \u2705 Yes | Internal\
        \ column name (snake_case recommended) |\n\n---\n\n## 8\uFE0F\u20E3 Example\
        \ Request\n\n``` bash\ncurl --location 'https://be.datagol.ai/noCo/api/v2/workspaces/{workspaceId}/tables/{workbookId}/column'\
        \ \\\n--header &#x27;Authorization: Bearer <token>&#x27; \\\n--header 'Content-Type:\
        \ application/json' \\\n--data '{\n  \"uiDataType\": \"SINGLE_LINE_TEXT\"\
        ,\n  \"uiMetadata\": {\n    \"title\": \"sample text\"\n  },\n  \"name\":\
        \ \"sample_text\"\n}'\n\n ```\n\n---\n\n## 9\uFE0F\u20E3 Behavior Summary\n\
        \n``` id=\"behcol2\"\nCreates a new workbook column.\nSupports:\n\u2022 Multiple\
        \ UI data types (TEXT, NUMBER, DATE, etc.)  \n\u2022 UI metadata configuration\
        \ for rendering  \n\u2022 Snake_case internal column naming  \n\u2022 Server-side\
        \ validation before creation\n\n ```"
      requestBody:
        content:
